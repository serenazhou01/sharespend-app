function updateMultiPayerHints() {
  let c = document.getElementById('fCur').value;
  let amt = parseFloat(document.getElementById('fAmt').value) || 0;
  let type = document.getElementById('fType').value;
  let label = type === 'refund' ? '收款' : '付款';
  let paidSum = 0;
  cur().people.forEach(p => {
    let hintEl = document.querySelector('[data-mp-hint="' + p + '"]');
    if (!hintEl) return;
    let v = parseFloat(S.fPayments[p]) || 0;
    paidSum += v;
    hintEl.textContent = v > 0 ? fmt(v, c) : '';
  });
  let hintEl = document.getElementById('multiPayerHint');
  let diffEl = document.getElementById('multiPayerDiff');
  if (amt > 0 && Math.abs(paidSum - amt) > 0.01) {
    let diff = amt - paidSum;
    hintEl.textContent = '⚠ ' + label + '合计(' + fmt(paidSum, c) + ') ≠ 总额(' + fmt(amt, c) + ')';
    hintEl.className = 'hint warn';
    if (diffEl) { diffEl.textContent = '差额 = ' + fmt(Math.abs(diff), c) + (diff > 0 ? '（少' + label + '）' : '（多' + label + '）'); diffEl.style.display = ''; }
  } else if (amt > 0 && Math.abs(paidSum - amt) <= 0.01) {
    hintEl.textContent = '✓ ' + label + '合计 ' + fmt(paidSum, c);
    hintEl.className = 'hint';
    if (diffEl) diffEl.style.display = 'none';
  } else {
    hintEl.textContent = '';
    if (diffEl) diffEl.style.display = 'none';
  }
}

function saveExpense() {
  let ev = cur();
  let name = document.getElementById('fName').value.trim();
  let amt = parseFloat(document.getElementById('fAmt').value);
  let type = document.getElementById('fType').value;
  let date = document.getElementById('fDate').value;
  let time = document.getElementById('fTime').value || '00:00';
  let currency = document.getElementById('fCur').value;
  if (!name) { toast('请输入名称'); return; }
  if (!amt || amt <= 0) { toast('请输入有效金额'); return; }
  let absAmt = amt;
  if (type === 'refund') { amt = -amt; }
  let personLabel = type === 'refund' ? '收款人' : '付款人';
  if (!S.fMultiPayer && !S.fPayer) { toast('请选择' + personLabel); return; }
  if (S.fMultiPayer) {
    if (S.fPayers.size === 0) { toast('请选择' + personLabel); return; }
    let paySum = 0;
    S.fPayers.forEach(p => { let n = parseFloat(S.fPayments[p]); if (n > 0) paySum += n; });
    if (paySum <= 0) { toast('请输入' + (type === 'refund' ? '收款' : '付款') + '金额'); return; }
    if (Math.abs(paySum - absAmt) > 0.01) { toast((type === 'refund' ? '收款' : '付款') + '合计须等于总金额'); return; }
  }
  if (S.fParts.size === 0) { toast('请至少选择一个分摊人'); return; }
  let custom = {};
  if (S.fCustom) { Object.keys(S.fCustoms).forEach(k => { let c = S.fCustoms[k]; let v = parseFloat(c.amount); if (!isNaN(v)) custom[k] = { amount: v, alsoSplit: c.alsoSplit || false }; }); }
  let multiPayments = {};
  if (S.fMultiPayer) {
    Object.keys(S.fPayments).forEach(k => {
      let v = parseFloat(S.fPayments[k]);
      if (!isNaN(v) && v > 0) multiPayments[k] = v;
    });
    let paySum = Object.values(multiPayments).reduce((a, b) => a + b, 0);
    if (Math.abs(paySum - absAmt) > 0.01) { toast((type === 'refund' ? '收款' : '付款') + '合计须等于总金额'); return; }
  }
  if (S.editingId) {
    let e = ev.expenses.find(x => x.id === S.editingId);
    if (e) { e.name = name; e.amount = amt; e.type = type; e.date = date; e.time = time; e.currency = currency; e.payer = S.fPayer; e.participants = [...S.fParts]; e.custom = Object.keys(custom).length > 0 ? custom : null; e.multiPayments = Object.keys(multiPayments).length > 0 ? multiPayments : null; e.updatedBy = CURRENT_USER.id; e.updatedAt = new Date().toISOString();
      saveBillCloud(e, true).catch(console.warn);
    }
    persistLocal(); render(); closeAll(); toast('已更新');
  } else {
    let newBill = { id: uid(), name, amount: amt, type: type, date, time, currency, payer: S.fPayer, participants: [...S.fParts], custom: Object.keys(custom).length > 0 ? custom : null, multiPayments: Object.keys(multiPayments).length > 0 ? multiPayments : null, settled: false,
      createdBy: CURRENT_USER.id, createdAt: new Date().toISOString(),
      updatedBy: CURRENT_USER.id, updatedAt: new Date().toISOString()
    };
    ev.expenses.push(newBill);
    saveBillCloud(newBill, false).catch(console.warn);
    persistLocal(); render(); closeAll(); toast('已保存');
  }
}

function delExpense(id) {
  let ev = cur();
  let e = ev.expenses.find(x => x.id === id);
  if (e && e.settled) return;
  confirmDanger('删除账单', '确定删除「' + e.name + '」？', '确定删除', function() {
    let cloudId = e._cloudId || e.id;
    ev.expenses = ev.expenses.filter(x => x.id !== id);
    deleteBillCloud(cloudId).catch(console.warn);
    persistLocal(); render();
  });
}


function showExpenseHistory() {
  if (!S.editingId) return;
  let ev = cur();
  let e = ev.expenses.find(x => x.id === S.editingId);
  if (!e) return;
  function fmtDt(iso) {
    if (!iso) return '—';
    try {
      let d = new Date(iso);
      let pad = n => String(n).padStart(2,'0');
      return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
    } catch(x){ return iso; }
  }
  let rows = [];
  if (e.createdAt) rows.push({ action:'创建', who: e.createdBy || '—', at: fmtDt(e.createdAt) });
  if (e.updatedAt && e.updatedAt !== e.createdAt) rows.push({ action:'编辑', who: e.updatedBy || '—', at: fmtDt(e.updatedAt) });
  let h = '<table class="detail-tbl" style="width:100%">';
  h += '<tr><th>操作</th><th>操作人</th><th>时间</th></tr>';
  if (rows.length === 0) {
    h += '<tr><td colspan="3" style="text-align:center;color:var(--text3)">暂无历史记录</td></tr>';
  } else {
    rows.forEach(r => {
      h += '<tr><td>' + r.action + '</td><td>' + esc(r.who) + '</td><td style="font-size:11px;white-space:nowrap">' + r.at + '</td></tr>';
    });
  }
  h += '</table>';
  h += '<div style="font-size:11px;color:var(--text3);margin-top:8px">🚧 多人共享后将记录所有成员的操作历史</div>';
  alertDlg('📋 账单历史记录', '', function(){});
  document.getElementById('dlgMsg').innerHTML = h;
}


function showInviteHelp() {

    '· 通过微信分享邀请成员加入',
    '· 可管理成员（添加 / 删除）',

let curSearchMode = null; // 'base' or 'list'
let curListSelected = new Set();

function showCurSearch(mode) {
  curSearchMode = mode;
  let dropId = mode === 'base' ? 'baseCurDrop' : 'curListDrop';
  let drop = document.getElementById(dropId);
  drop.classList.add('show');
  filterCurSearch(mode);
}

function hideCurSearch(mode) {
  let dropId = mode === 'base' ? 'baseCurDrop' : 'curListDrop';
  let drop = document.getElementById(dropId);
  drop.classList.remove('show');
}

function filterCurSearch(mode) {
  let inputId = mode === 'base' ? 'baseCurInput' : 'curListInput';
  let dropId = mode === 'base' ? 'baseCurDrop' : 'curListDrop';
  let query = document.getElementById(inputId).value.trim();
  let queryLower = query.toLowerCase();
  let drop = document.getElementById(dropId);
  let results = CURRENCY_DB.filter(c => {
    if (!queryLower) return true;
    let searchStr = (c.code + ' ' + c.name + ' ' + c.countries.join(' ')).toLowerCase();
    return searchStr.includes(queryLower);
  });
  let h = '';
  if (results.length > 0) {
    h = results.slice(0, 20).map(c => {
      let countries = c.countries.filter(x => x !== 'CNY').slice(0, 3).join('/');
      let codeDisplay = c.code === 'RMB' ? 'CNY（RMB）' : c.code;
      return '<div class="cur-search-item" onclick="selectCur(\'' + mode + '\',\'' + c.code + '\')">' +
        '<span class="cur-code">' + codeDisplay + '</span>' +
        '<span class="cur-name">' + c.name + '</span>' +
        '<span class="cur-countries">' + countries + '</span></div>';
    }).join('');
  }
  // Allow manual input of custom currency code
  let customCode = query.toUpperCase().replace(/[^A-Z]/g, '').slice(0, 5);
  if (customCode.length >= 2 && !CURRENCY_DB.some(c => c.code === customCode)) {
    h += '<div class="cur-search-item" onclick="selectCur(\'' + mode + '\',\'' + customCode + '\')" style="border-top:1px dashed #D1D5DB">' +
      '<span class="cur-code">' + customCode + '</span>' +
      '<span class="cur-name" style="color:var(--primary)">手动添加</span></div>';
  }
  if (!h) {
    h = '<div class="cur-search-empty">未找到匹配币种</div>';
  }
  drop.innerHTML = h;
}

function selectCur(mode, code) {
  if (mode === 'base') {
    document.getElementById('baseCurInput').value = code;
    hideCurSearch('base');
  } else {
    curListSelected.add(code);
    renderCurChips();
    document.getElementById('curListInput').value = '';
    filterCurSearch('list');
  }
}

function removeCurChip(code) {
  curListSelected.delete(code);
  renderCurChips();
}

function renderCurChips() {
  let box = document.getElementById('curChipsBox');
  if (curListSelected.size === 0) {
    box.innerHTML = '';
  } else {
    box.innerHTML = [...curListSelected].map(c =>
      '<span class="cur-chip" onclick="removeCurChip(\'' + c + '\')">' + c + '<span class="cur-chip-x">✕</span></span>'
    ).join('');
  }
}

function memberAction(p) {
  let ev3 = cur();
  let used = ev3.expenses.some(function(e){ return e.payer === p || (e.participants && e.participants.includes(p)); });
  let inputId = 'memberRenameInput';
  let content = '<div style="margin-bottom:4px">'
    + '<label style="font-size:11px;color:var(--text2);font-weight:700;display:block;margin-bottom:6px">成员名字</label>'
    + '<input id="' + inputId + '" class="fi" value="' + esc(p) + '" placeholder="输入新名字">'
    + '</div>'
    + (used ? '<div style="font-size:11px;color:var(--text3);margin-top:8px">该成员已有账单记录，不可删除</div>' : '');
  let deleteBtn = used
    ? '<button class="dlg-btn dlg-btn-danger" style="opacity:.35;cursor:not-allowed" disabled>删除</button>'
    : '<button class="dlg-btn dlg-btn-danger" id="dlgDeleteMemberBtn">删除</button>';
  showDialog({
    title: '编辑成员',
    content: content,
    cancel: false,
    okText: '修改', okClass: 'dlg-btn-ok',
    extraBtns: [{ text: used ? '删除（不可用）' : '删除', cls: used ? 'dlg-btn-danger' : 'dlg-btn-danger', fn: used ? null : function(){
      confirmDanger('删除成员', '确定删除「' + p + '」？', '确定删除', function() {
        removePerson(p); toast('已删除');
      });
    }, disabled: used }],
    onOk: function() {
      let el = document.getElementById(inputId);
      let newName = el ? el.value.trim() : '';
      if (!newName) { showDlgErr('名字不能为空'); return false; }
      if (newName === p) return true;
      let ev4 = cur();
      if (ev4.people.includes(newName)) { showDlgErr('该名字已存在'); return false; }
      let idx2 = ev4.people.indexOf(p);
      if (idx2 >= 0) ev4.people[idx2] = newName;
      ev4.expenses.forEach(function(e) {
        if (e.payer === p) e.payer = newName;
        if (e.participants) e.participants = e.participants.map(function(x){ return x === p ? newName : x; });
        if (e.custom && e.custom[p]) { e.custom[newName] = e.custom[p]; delete e.custom[p]; }
        if (e.multiPayments && e.multiPayments[p]) { e.multiPayments[newName] = e.multiPayments[p]; delete e.multiPayments[p]; }
      });
      persistLocal(); renderManageChips(); render();
      toast('已改名为 ' + newName);
    }
  });
}

function renamePerson(oldName) {
  showDialog({
    title: '改名：' + oldName, msg: '',
    input: oldName, placeholder: '输入新名字',
    cancel: true, cancelText: '取消',
    okText: '确认改名', okClass: 'dlg-btn-ok',
    onOk: function(newName) {
      newName = (newName || '').trim();
      if (!newName) { showDlgErr('名字不能为空'); return false; }
      if (newName === oldName) return true;
      let ev4 = cur();
      if (ev4.people.includes(newName)) { showDlgErr('该名字已存在'); return false; }
      let idx2 = ev4.people.indexOf(oldName);
      if (idx2 >= 0) ev4.people[idx2] = newName;
      ev4.expenses.forEach(function(e) {
        if (e.payer === oldName) e.payer = newName;
        if (e.participants) e.participants = e.participants.map(function(x){ return x === oldName ? newName : x; });
        if (e.custom && e.custom[oldName]) { e.custom[newName] = e.custom[oldName]; delete e.custom[oldName]; }
        if (e.multiPayments && e.multiPayments[oldName]) { e.multiPayments[newName] = e.multiPayments[oldName]; delete e.multiPayments[oldName]; }
      });
      persistLocal(); renderManageChips(); render();
      toast('已改名为 ' + newName);
    }
  });
}

function addPerson() {
  let ev = cur();
  let raw = document.getElementById('newName').value;
  let names = raw.split(/[,，]/).map(s => s.trim()).filter(Boolean);
  if (names.length === 0) { toast('请输入名字'); return; }
  let added = 0;
  names.forEach(n => {
    if (!ev.people.includes(n)) { ev.people.push(n); added++; }
  });
  document.getElementById('newName').value = '';
  persistLocal(); renderManageChips();
  if (added > 0) toast('已添加 ' + added + ' 人');
  else toast('名字已存在');
}

function removePerson(p) {
  let ev = cur();
  let used = ev.expenses.some(e => e.payer === p || e.participants.includes(p));
  if (used) { toast('该成员有账单，无法删除'); return; }
  ev.people = ev.people.filter(x => x !== p);
  persistLocal(); renderManageChips();
}

/* ========== Custom Dialog ========== */
function showDialog(opts) {
  let ov = document.getElementById('dlgOv');
  let titleEl = document.getElementById('dlgTitle');
  let msgEl = document.getElementById('dlgMsg');
  let contentEl = document.getElementById('dlgContent');
  let inputEl = document.getElementById('dlgInput');
  let errEl = document.getElementById('dlgErr');
  let actsEl = document.getElementById('dlgActs');
  titleEl.textContent = opts.title || '';
  let shareBtn = document.getElementById('dlgShareBtn');
  if (shareBtn) shareBtn.style.display = (opts.title && opts.title.startsWith('确认结算')) ? 'flex' : 'none';
  msgEl.textContent = opts.msg || '';
  errEl.style.display = 'none';
  errEl.textContent = '';
  if (opts.content) {
    contentEl.style.display = '';
    contentEl.innerHTML = opts.content;
  } else {
    contentEl.style.display = 'none';
    contentEl.innerHTML = '';
  }
  if (opts.input !== undefined) {
    inputEl.style.display = '';
    inputEl.value = opts.input || '';
    inputEl.placeholder = opts.placeholder || '';
  } else {
    inputEl.style.display = 'none';
  }
  let h = '';
  if (opts.cancel) h += '<button class="dlg-btn dlg-btn-cancel" onclick="closeDialog()">' + (opts.cancelText || '取消') + '</button>';
  if (opts.extraBtns) opts.extraBtns.forEach(function(b,i){ h += '<button class="dlg-btn ' + b.cls + '" id="dlgExtraBtn'+i+'">'+b.text+'</button>'; });
  h += '<button class="dlg-btn ' + (opts.okClass || 'dlg-btn-ok') + '" id="dlgOkBtn">' + (opts.okText || '确定') + '</button>';
  actsEl.innerHTML = h;
  if (opts.extraBtns) opts.extraBtns.forEach(function(b,i){ let el=document.getElementById('dlgExtraBtn'+i); if(!el) return; if(b.disabled){ el.style.opacity='.35'; el.style.cursor='not-allowed'; el.disabled=true; } else { el.onclick=function(){ closeDialog(); b.fn && b.fn(); }; } });
  ov.classList.toggle('top', !!opts.topPosition);
  let okBtn = document.getElementById('dlgOkBtn');
  okBtn.onclick = function() {
    let val = opts.input !== undefined ? inputEl.value.trim() : true;
    if (opts.onOk) {
      let result = opts.onOk(val);
      if (result === false) return;
    }
    closeDialog();
  };
  ov.classList.add('show');
  if (opts.input !== undefined) setTimeout(function() { inputEl.focus(); }, 100);
}
function closeDialog() { document.getElementById('dlgOv').classList.remove('show'); }
function showDlgErr(msg) { let el = document.getElementById('dlgErr'); el.textContent = msg; el.style.display = ''; }
function alertDlg(title, msg, onOk) { showDialog({ title: title, msg: msg, cancel: false, okText: '确定', okClass: 'dlg-btn-ok', onOk: onOk }); }
function confirmDlg(title, msg, onOk) { showDialog({ title: title, msg: msg, cancel: true, cancelText: '取消', okText: '确定', okClass: 'dlg-btn-ok', onOk: onOk }); }
function confirmDanger(title, msg, okText, onOk) { showDialog({ title: title, msg: msg, cancel: true, cancelText: '取消', okText: okText, okClass: 'dlg-btn-danger', onOk: onOk }); }
function promptDlg(title, placeholder, onOk) { showDialog({ title: title, msg: '', input: '', placeholder: placeholder, cancel: true, cancelText: '取消', okText: '确定', okClass: 'dlg-btn-ok', onOk: onOk }); }

function shareSettle() {
  let body = document.getElementById('settleResultBody');
  if (!body) return;
  let ev = cur();
  let lines = ['📋 ' + (ev ? ev.name : '行程') + ' · 结算单', ''];
  body.querySelectorAll('.sm-section').forEach(sec => {
    let h4 = sec.querySelector('h4');
    if (h4) lines.push('【' + h4.textContent + '】');
    sec.querySelectorAll('.tf').forEach(row => {
      lines.push(row.textContent.trim().replace(/\s+/g, ' '));
    });
    sec.querySelectorAll('.bal-i').forEach(row => {
      lines.push(row.textContent.trim().replace(/\s+/g, ' '));
    });
    lines.push('');
  });
  let text = lines.join('\n');
  if (navigator.share) {
    navigator.share({ title: '结算单', text: text }).catch(()=>{});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast('结算单已复制，可粘贴分享'));
  } else {
    toast('分享：请截图发送给群里');
  }
}

function applyTheme(id) {
  const t = THEMES.find(x=>x.id===id) || THEMES[0];
  const r = document.documentElement.style;
  r.setProperty('--t-bg', t.bg);
  r.setProperty('--t-accent', t.accent);
  r.setProperty('--t-main', t.main);
  r.setProperty('--t-dark', t.dark);
  r.setProperty('--t-grad1', t.grad1);
  r.setProperty('--t-grad2', t.grad2);
  document.body.style.background = t.bg;
  localStorage.setItem('aa_theme', id);
  document.querySelectorAll('.theme-swatch').forEach(el=>{
    let tid = el.dataset.tid;
    let tData = THEMES.find(x=>x.id===tid);
    el.style.boxShadow = tid===id ? '0 0 0 2.5px #fff,0 0 0 5px '+(tData?tData.dark:'#111') : '0 1px 4px rgba(0,0,0,.1)';

    let kbHeight = window.innerHeight - vv.height;
    if (kbHeight < 100) {
      // No keyboard or small difference — center the modal
      let modal = focused.closest('.modal,.dlg');
      if (modal) modal.style.transform = '';
      return;
    }
    // Scroll the focused element just above the keyboard
    let rect = focused.getBoundingClientRect();
    let elBottom = rect.bottom;
    let visibleBottom = vv.offsetTop + vv.height;
    if (elBottom > visibleBottom - 16) {
      let scrollNeeded = elBottom - (visibleBottom - 16);
      let modal = focused.closest('.modal');
      if (modal) {
        // Shift modal up
        let curTranslate = parseFloat(modal.style.transform.replace('translateY(','')) || 0;
        modal.style.transform = 'translateY(-' + scrollNeeded + 'px)';
      } else {
        focused.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  }
  window.visualViewport.addEventListener('resize', onViewportChange);
  window.visualViewport.addEventListener('scroll', onViewportChange);
  document.addEventListener('focusin', function(e) {
    if (!['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    setTimeout(onViewportChange, 300);
  });
  document.addEventListener('focusout', function(e) {
    if (!['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    setTimeout(function(){
      document.querySelectorAll('.modal').forEach(m => { m.style.transform = ''; });
    }, 100);
  });
})();

/* ========== Drag-to-close for bottom sheet modals ========== */
(function(){
  function initDragClose(modal) {
    let handle = modal.querySelector('.m-handle');
    if (!handle || handle._dragInit) return;
    handle._dragInit = true;

    let startY = 0, currentY = 0, dragging = false;
    const THRESHOLD = 80;

    function onTouchStart(e) {
      startY = e.touches[0].clientY;
      currentY = 0;
      dragging = true;
      modal.style.transition = 'none';
    }
    function onTouchMove(e) {
      if (!dragging) return;
      let dy = e.touches[0].clientY - startY;
      if (dy < 0) return;
      currentY = dy;
      modal.style.transform = 'translateY(' + dy + 'px)';
    }
    function onTouchEnd() {
      if (!dragging) return;
      dragging = false;
      modal.style.transition = '';
      if (currentY > THRESHOLD) {
        modal.style.transform = '';
        closeAll();
      } else {
        modal.style.transform = '';
      }
    }

    handle.addEventListener('touchstart', onTouchStart, { passive: true });
    handle.addEventListener('touchmove', onTouchMove, { passive: true });
    handle.addEventListener('touchend', onTouchEnd, { passive: true });
  }

  function initAll() {
    document.querySelectorAll('.modal').forEach(initDragClose);
  }

  let _origOpen = window.openModal;
  window.openModal = function(id) {
    _origOpen(id);
    setTimeout(initAll, 50);
  };

  setTimeout(initAll, 200);
})();
</script>
