<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>ShareSpend</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --t-bg:#E8EBF2;--t-card:#ffffff;--t-accent:#EAECF0;--t-main:#555555;--t-dark:#111111;--t-grad1:#E8ECF5;--t-grad2:#EDE8F5;
  --primary:var(--t-main);--bg:var(--t-bg);--card:var(--t-card);--text:#111111;--text2:#555555;--text3:#999999;
  --border:rgba(0,0,0,.07);--danger:#E05040;--success:#2A8A50;--warn:#D09020;
  --btn-primary:var(--t-dark);--btn-text:#ffffff;
  --tag-blue-bg:rgba(80,120,200,.1);--tag-blue-text:#2A4A90;--tag-red-bg:rgba(200,80,60,.1);--tag-red-text:#A03020;--tag-green-bg:rgba(40,140,80,.1);--tag-green-text:#1A6030;--tag-yellow-bg:rgba(200,150,40,.12);--tag-yellow-text:#7A5010;
  --r:24px;--shadow:0 1px 4px rgba(0,0,0,.03),0 4px 12px rgba(0,0,0,.02);
  --theme-primary:var(--t-main);--theme-btn:var(--t-dark);--theme-active:var(--t-main);
  --theme-chip-bg:var(--t-accent);--theme-chip-border:rgba(0,0,0,.1);
  --theme-grad-a:var(--t-accent);--theme-grad-b:var(--t-accent);
  --theme-border:rgba(0,0,0,.07);--theme-light-bg:var(--t-accent)
}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC','Source Han Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--t-bg);color:var(--text);font-size:15px;-webkit-tap-highlight-color:transparent;transition:background .3s}
.app{display:flex;flex-direction:column;height:100%;max-width:500px;margin:0 auto;background:transparent;position:relative}
.hdr{background:linear-gradient(135deg,var(--t-grad1) 0%,var(--t-grad2) 100%);color:#111;padding:calc(env(safe-area-inset-top,12px) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,.05);transition:background .4s}
.hdr h1{font-size:19px;font-weight:700;font-family:'Noto Serif SC',Georgia,serif;letter-spacing:0.2px;color:#111}
.hdr-r{display:flex;gap:8px;align-items:center}
.hdr-btn{background:#fff;border:none;color:#111;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 6px rgba(0,0,0,.1);transition:box-shadow .2s,transform .15s}.hdr-btn:active{transform:scale(.92)}
.tabs{display:flex;background:#fff;border-bottom:1px solid rgba(0,0,0,.07);flex-shrink:0}
.tab{flex:1;padding:11px;text-align:center;font-weight:600;color:#AAAAAA;border-bottom:2.5px solid transparent;cursor:pointer;transition:color .2s,border-color .2s;font-family:'Noto Serif SC',Georgia,serif}
.tab.on{color:#111;border-bottom-color:var(--t-main)}
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:80px;scroll-behavior:smooth}
.sec{padding:8px 16px 10px;display:flex;flex-wrap:wrap;align-items:center;gap:6px}
.sec-title{font-size:12px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;flex:1 1 100%;}
.dchip{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:500;user-select:none;transition:all .18s cubic-bezier(.4,0,.2,1);border:1px solid var(--border);background:#fff;color:var(--text2)}
.dchip.on{background:var(--theme-light-bg);color:var(--theme-active);border-color:var(--theme-chip-border)}
.card{background:#fff;border-radius:var(--r);margin:0 14px 16px;padding:14px 16px;box-shadow:0 4px 16px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);border:none;transition:box-shadow .2s}
.card:active{box-shadow:0 1px 4px rgba(0,0,0,.06)}
.ei{padding:14px 0;border-bottom:1px solid #F5F5F5}
.ei:last-child{border-bottom:none}
.ei.settled{opacity:.45}
.ei.settled .ei-name::after{content:'已结算';font-size:10px;background:rgba(139,196,160,.2);color:#3A7850;padding:2px 8px;border-radius:10px;margin-left:6px;font-weight:500;vertical-align:middle}
.ei.settled .ei-amt{color:var(--text2)}
.ei-row{display:flex;align-items:flex-start;cursor:pointer;transition:opacity .15s}.ei-row:active{opacity:.6}
.ei-body{flex:1;min-width:0}
.ei-name{font-weight:600;font-size:15px;font-family:'Noto Sans SC',sans-serif}
.ei-meta{font-size:12px;color:var(--text2);margin-top:3px;width:100%;overflow-wrap:break-word;word-break:break-all}
.ei-detail{font-size:12px;color:var(--text2);margin-top:2px;padding-left:18px}
.ei-expand{display:none;padding:8px 0 4px 12px;border-top:1px dashed var(--border);margin-top:8px}
.ei-expand.show{display:block}
.ei-expand-tbl{width:100%;border-collapse:collapse;font-size:12px}
.ei-expand-tbl th{text-align:left;padding:4px 6px;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border)}
.ei-expand-tbl td{padding:4px 6px}
.ei-expand-tbl td:last-child,.ei-expand-tbl th:last-child{text-align:right}

.ei-arrow{font-size:10px;color:var(--text3);margin-left:4px;transition:transform .2s}
.ei-arrow.open{transform:rotate(90deg)}
.ei-r{text-align:right;padding-left:8px;display:flex;flex-direction:column;align-items:flex-end;gap:2px;justify-content:center;flex-shrink:0}
.ei-arrow-left{font-size:10px;color:var(--text3);margin-right:8px;flex-shrink:0;transition:transform .2s}
.ei-arrow-left.open{transform:rotate(90deg)}
.ei-wrap{display:grid;grid-template-columns:auto 1fr auto;align-items:start;cursor:pointer;gap:0 0}
.ei-main{min-width:0}
.ei-top{display:flex;justify-content:space-between;align-items:baseline}
.ei-arrow-br{font-size:10px;color:var(--text3);cursor:pointer;transition:transform .2s;align-self:end;margin-left:8px;padding:4px 0}
.ei-arrow-br.open{transform:rotate(90deg)}
.ei-r .ei-arrow{font-size:10px;color:var(--text3);cursor:pointer;transition:transform .2s;margin-top:auto}
.ei-amt{font-weight:900;font-size:20px;color:#2E3138;font-family:'Noto Serif SC',Georgia,serif}
.ei-acts{display:flex;gap:4px;margin-top:4px}
.ei-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:2px 4px;color:#ccc}
.ei-btn:active{color:var(--text2)}
.ei-btn.del:active{color:var(--danger)}
.ei-check{width:20px;height:20px;margin-right:10px;margin-top:2px;accent-color:var(--primary);flex-shrink:0}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-i{font-size:48px;margin-bottom:12px}
.s-card{background:#fff;border-radius:var(--r);margin:0 14px 16px;padding:14px 16px;box-shadow:0 4px 16px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);border:none}
.s-card h3{font-size:12px;color:var(--text2);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;font-family:'Noto Serif SC',Georgia,serif}
.bal-i{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.bal-v{font-weight:500;font-variant-numeric:tabular-nums;color:#111}
.bal-pos{color:#1A7A40}.bal-neg{color:#C03020}.bal-zero{color:var(--text3)}
.tf{display:flex;align-items:center;padding:7px 0;gap:6px}
.tf-n{font-weight:400;min-width:28px;text-align:center}
.tf-arr{color:var(--primary);font-size:18px}
.tf-amt{flex:1;text-align:right;font-weight:500;color:var(--t-dark);font-size:16px;font-variant-numeric:tabular-nums}
.settle-btn{border:none;padding:16px;border-radius:24px;width:calc(100% - 28px);margin:16px 14px;font-size:15px;font-weight:700;cursor:pointer;display:block;background:var(--t-dark);color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.12);transition:background .3s,transform .15s}
.settle-btn:active{transform:scale(.98);opacity:.85}
.fab{position:fixed;bottom:28px;right:24px;width:60px;height:60px;border-radius:50%;background:var(--t-dark);color:#fff;border:none;font-size:32px;line-height:1;box-shadow:0 6px 20px rgba(0,0,0,.15);cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center;transition:background .3s,transform .15s,box-shadow .15s}
.fab:active{transform:scale(.88);box-shadow:0 3px 10px rgba(0,0,0,.12)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.show{opacity:1;pointer-events:auto}
.modal{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:28px 28px 0 0;padding:16px 16px calc(env(safe-area-inset-bottom,12px) + 16px);z-index:101;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:calc(100vh - 155px);overflow-y:auto;max-width:500px;margin:0 auto}
.modal.show{transform:translateY(0)}
.m-handle{display:none}
.m-title{font-size:17px;font-weight:700;text-align:center;padding:2px 0 12px;font-family:'Noto Serif SC',Georgia,serif}
.fg{margin-bottom:10px}
.fl{font-size:12px;color:var(--text2);font-weight:700;margin-bottom:5px;display:block}
.fg-err{color:var(--danger);font-size:12px;margin-top:4px}
.fi{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:16px;font-size:16px;outline:none;background:#fff;transition:border .15s;-webkit-appearance:none}
.fi:focus{border-color:var(--primary)}
.cur-search-wrap{position:relative}
.cur-search-drop{display:none;position:absolute;left:0;right:0;top:100%;margin-top:4px;background:#fff;border:1.5px solid var(--border);border-radius:10px;max-height:200px;overflow-y:auto;z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.cur-search-drop.show{display:block}
.cur-search-item{padding:10px 12px;cursor:pointer;font-size:14px;border-bottom:1px solid #F0EDE6}
.cur-search-item:last-child{border-bottom:none}
.cur-search-item:hover{background:#F5EFE5}
.cur-search-item .cur-code{font-weight:700;color:var(--primary);margin-right:8px}
.cur-search-item .cur-name{color:var(--text2);margin-right:6px}
.cur-search-item .cur-countries{color:var(--text3);font-size:12px}
.cur-search-empty{padding:16px;text-align:center;color:var(--text3);font-size:13px}
.cur-chips-box{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.cur-chip{display:inline-flex;align-items:center;gap:4px;padding:7px 16px;background:var(--theme-light-bg);color:var(--theme-active);border-radius:20px;font-size:14px;font-weight:600;cursor:pointer}
.cur-chip:hover{opacity:.85}
.cur-chip-x{font-size:14px;line-height:1;margin-left:2px}
.fr{display:flex;gap:8px}.fr>*{flex:1}
.cg{display:flex;flex-wrap:wrap;gap:6px}
.ch{padding:8px 18px;border-radius:22px;border:1px solid var(--border);font-size:14px;cursor:pointer;background:#fff;transition:.15s;font-weight:500;user-select:none}
.ch.on{background:var(--theme-chip-bg);color:var(--theme-active);border-color:var(--theme-chip-border);font-weight:600}
.tgl{display:flex;align-items:center;gap:8px;padding:10px 0;cursor:pointer;user-select:none;font-size:14px;color:var(--text2);font-weight:500}
.tgl-sw{width:40px;height:22px;background:var(--border);border-radius:11px;position:relative;transition:.2s;flex-shrink:0}
.tgl-sw.on{background:var(--theme-primary)}
.tgl-sw::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tgl-sw.on::after{left:20px}
.ai{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:8px 0}
.ai-n{font-weight:600;min-width:36px}
.ai-in{width:80px;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:16px;outline:none;-webkit-appearance:none}
.ai-in:focus{border-color:var(--primary)}
.ai-sw{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:11px;cursor:pointer;font-weight:600;user-select:none;white-space:nowrap;transition:.15s;border:1px solid transparent}
.ai-sw.on{background:rgba(139,196,160,.2);color:#3A7850;border-color:rgba(139,196,160,.4)}
.ai-sw.off{background:#fff;color:var(--text2);border-color:var(--border)}
.ai-sw-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;transition:.15s;position:relative}
.ai-sw.on .ai-sw-dot{background:#3A7850}
.ai-sw.on .ai-sw-dot::after{content:'';position:absolute;top:3px;left:3px;width:8px;height:8px;border-radius:50%;background:#fff}
.ai-sw.off .ai-sw-dot{background:var(--border)}
.ai-h{font-size:11px;color:var(--text2);min-width:50px;text-align:right}
.hint{font-size:12px;color:var(--primary);padding:6px 0;min-height:18px;font-weight:500}
.warn{color:var(--danger)}
.m-acts{display:flex;gap:8px;margin-top:14px;padding-top:10px;border-top:1px solid var(--border)}
.btn{flex:1;padding:14px;border-radius:22px;border:none;font-size:16px;font-weight:600;cursor:pointer}
.btn-p{background:var(--t-dark);color:#fff;border-radius:24px;transition:background .3s}.btn-p:active{opacity:.8}
.btn-s{background:var(--t-dark);color:#fff;border:none;border-radius:24px;transition:background .3s}.btn-s:active{opacity:.7}
.btn-d{background:#F7DAD8;color:#E07A72;border:none;border-radius:24px}.btn-d:active{opacity:.7}
.btn-w{background:rgba(245,216,122,.2);color:#8B7020;border:none;border-radius:24px}.btn-w:active{opacity:.7}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:#2E3138;color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;z-index:999;opacity:0;transition:.2s;pointer-events:none}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.cur-sel{padding:12px 10px;border:1px solid var(--border);border-radius:16px;font-size:14px;font-weight:600;background:#fff;outline:none;-webkit-appearance:none;min-width:70px}
.cur-sel:focus{border-color:var(--primary)}
.settled-list{margin:6px 16px}
.settled-item{display:flex;align-items:center;padding:10px 14px;background:var(--card);border-radius:var(--r);margin-bottom:6px;box-shadow:var(--shadow);opacity:.55}
.settled-item .si-name{font-weight:600;flex:1}
.settled-item .si-amt{font-weight:600;color:var(--text2);margin-right:8px}
.unsettle-btn{background:none;border:1px solid var(--border);border-radius:12px;padding:4px 10px;font-size:12px;color:var(--text2);cursor:pointer}
.unsettle-btn:active{opacity:.7}
.cur-tag{display:inline-block;font-size:11px;color:var(--theme-active);background:var(--theme-light-bg);padding:2px 8px;border-radius:10px;margin-left:4px;font-weight:500}
.tf-toggle{font-size:12px;color:var(--text2);cursor:pointer;padding:8px 0 4px;user-select:none;display:flex;align-items:center;gap:4px}
.tf-toggle:active{color:var(--primary)}
.tf-detail{display:none;padding:6px 0}
.tf-detail.show{display:block}
.tf-detail-bill{font-size:11px;color:var(--text2);font-weight:600;padding:8px 0 2px}
.tf-detail-bill:first-child{padding-top:0}
.tf-detail-item{font-size:11px;color:var(--text2);padding:3px 0}
.tf-detail-sep{border-top:1px solid var(--border);margin:6px 0}
.dt-row{display:flex;gap:8px}
.dt-row>*{flex:1}
.rate-row{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border:1px solid var(--border);border-radius:12px}
.rate-row span{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap}
.rate-in{flex:1;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:16px;outline:none;background:#fff;text-align:center;min-width:0;-webkit-appearance:none}
.rate-in:focus{border-color:var(--primary)}
.rate-hint{font-size:11px;color:var(--text2);padding:6px 0}
.sb-ov{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:199;opacity:0;pointer-events:none;transition:opacity .2s}
.sb-ov.show{opacity:1;pointer-events:auto}
.sb{position:fixed;top:0;left:0;bottom:0;width:300px;max-width:85vw;background:#fff;z-index:200;transform:translateX(-100%);transition:transform .3s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;box-shadow:2px 0 12px rgba(0,0,0,.1)}
.sb.show{transform:translateX(0)}
.sb-hdr{padding:calc(env(safe-area-inset-top,12px) + 12px) 16px 12px;background:linear-gradient(135deg,var(--t-grad1) 0%,var(--t-grad2) 100%);border-bottom:1px solid rgba(0,0,0,.05);color:#111;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;transition:background .4s}
.sb-hdr h2{font-size:16px;font-weight:700;font-family:'Noto Serif SC',Georgia,serif;color:var(--t-dark)}
.sb-list{flex:1;overflow-y:auto;padding:8px 0}
.sb-item{display:flex;align-items:center;padding:14px 16px;cursor:pointer;transition:.15s;border-left:3px solid transparent}
.sb-item:active{background:#F0EDE6}
.sb-item.on{background:var(--theme-light-bg);border-left-color:var(--theme-primary)}
.sb-item .sb-name{flex:1;font-size:15px;font-weight:500}
.sb-item.on .sb-name{font-weight:700;color:#111}
.dissolved-trip .sb-name::after{content:' · 已存档';font-size:11px;color:var(--text3);font-weight:400}
.sb-item .sb-cnt{font-size:12px;color:var(--text2);margin-right:8px}
.sb-item .sb-del{background:none;border:none;color:#ccc;font-size:16px;padding:6px 8px;cursor:pointer;border-radius:4px;min-width:32px;min-height:32px;display:flex;align-items:center;justify-content:center}
.sb-item .sb-del:active{color:var(--danger);background:#FEE2E2}
.sb-foot{padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:calc(env(safe-area-inset-bottom,12px) + 14px)}
.sb-foot button{width:100%;padding:16px;border-radius:24px;border:none;background:var(--t-dark);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:background .3s,transform .15s}
.sb-foot button:active{transform:scale(.98);opacity:.85}
.settle-modal{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:28px 28px 0 0;padding:0 16px calc(env(safe-area-inset-bottom,12px) + 16px);z-index:101;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:85vh;overflow-y:auto;max-width:500px;margin:0 auto}
.settle-modal.show{transform:translateY(0)}
.sm-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 8px}
.sm-title{font-size:17px;font-weight:700;text-align:center;padding:2px 0 14px;color:#111;font-family:'Noto Serif SC',Georgia,serif}
.sm-section{margin-bottom:10px;background:rgba(245,225,140,.12);border-radius:12px;padding:12px 14px}
.sm-section h4{font-size:12px;color:var(--text3);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.sm-sep{border-top:1px solid var(--border);margin:12px 0}
.sm-done{width:100%;padding:14px;border-radius:24px;border:none;background:var(--t-dark);color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .3s}
.sm-done:active{opacity:.8}
.dlg-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:24px}
.dlg-ov.top{align-items:flex-start;padding-top:24px}
.dlg-ov.show{opacity:1;pointer-events:auto}
.dlg{background:#fff;border-radius:16px;padding:24px 20px 16px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15);transform:scale(.9);transition:transform .2s}
.dlg-ov.show .dlg{transform:scale(1)}
.dlg-title{font-size:16px;font-weight:700;text-align:center;margin-bottom:8px}
.dlg-msg{font-size:14px;color:var(--text2);text-align:left;line-height:1.6;margin-bottom:16px;white-space:pre-wrap}
.dlg-input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:12px;font-size:16px;outline:none;-webkit-appearance:none;margin-bottom:16px}
.dlg-input:focus{border-color:var(--primary)}
.dlg-err{color:#DC2626;font-size:12px;margin:-12px 0 12px;padding:4px 0}
.dlg-acts{display:flex;gap:8px}
.dlg-btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer}
.dlg-btn:active{opacity:.8}
.dlg-btn-cancel{background:#F0F2F5;color:#6F7785;border-radius:24px}
.dlg-btn-ok{background:var(--t-dark);color:#fff;border-radius:24px;transition:background .3s}
.dlg-btn-success{background:rgba(139,196,160,.2);color:#3A7850;border-radius:24px}
.dlg-btn-danger{background:#F7DAD8;color:#E07A72;border-radius:24px}
#dlgContent .sm-section{background:rgba(245,225,140,.12);border-radius:10px;padding:12px 14px;margin-bottom:10px}
#dlgContent .sm-section:last-child{margin-bottom:0}
#dlgContent .sm-section h4{margin-bottom:6px}
#dlgContent .tf{padding:8px 0}
#dlgContent .bal-i{padding:5px 0}
.stat-card{background:#fff;border-radius:20px;margin:0 14px 16px;padding:8px 14px 14px;box-shadow:0 4px 16px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);border:none;position:relative}
.stat-card::before{display:none}
.stat-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
.stat-hdr-l{display:flex;align-items:center;gap:6px;flex-shrink:0}
.stat-hdr-l .stat-icon{font-size:16px}
.stat-hdr span{font-size:14px;color:#2E3138;font-weight:700;letter-spacing:.3px;font-family:'Noto Serif SC','Lyon Text',Georgia,serif}
.stat-tog{display:inline-flex;border-radius:14px;background:var(--t-accent);padding:4px;gap:3px;position:relative}
.stat-tog span{padding:6px 14px;cursor:pointer;color:var(--text2);transition:all .22s cubic-bezier(.4,0,.2,1);border-radius:10px;font-weight:500;font-size:11px;line-height:1.4;position:relative;z-index:1;white-space:nowrap;letter-spacing:.1px}
.stat-tog span.on{background:#fff;color:var(--t-dark);font-weight:700;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.stat-tog-thumb{display:none}
.stat-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.stat-cur-tog{display:inline-flex;border-radius:20px;overflow:hidden;background:rgba(123,171,200,.1);font-size:11px;border:none;padding:2px}
.stat-cur-tog span{padding:5px 12px;cursor:pointer;color:#6F7785;transition:.2s;border-radius:20px;font-weight:500}
.stat-cur-tog span.on{background:var(--theme-chip-bg);color:var(--theme-active);font-weight:600}
.stat-grid{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
.stat-tbl{border-collapse:collapse;font-size:12px;white-space:nowrap;min-width:100%}
.stat-tbl.single{width:100%}
.stat-tbl.single td:last-child,.stat-tbl.single th:last-child{text-align:right;width:100%}
.stat-tbl th:first-child,.stat-tbl td:first-child{position:sticky;left:0;z-index:1;text-align:left;background:#fff}
.stat-tbl td:first-child{background:#fff}
.stat-tbl th{text-align:right;color:#6F7785;font-weight:600;padding:6px 10px;border-bottom:1px solid rgba(0,0,0,.08);font-size:11px;min-width:72px}
.stat-tbl td{text-align:right;padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.05);color:#111;min-width:72px}
.stat-tbl b{color:#2E3138;font-size:13px;font-weight:500}
.stat-tbl .clickable-name{cursor:pointer}
.stat-tbl .clickable-name:active{opacity:.7}
.stat-hdr-l{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stat-hint{font-size:11px;color:#A2A8B3;padding:4px 0 2px}
.stat-foot{display:flex;justify-content:space-between;align-items:center;padding:4px 0 2px}
.help-btn{width:18px;height:18px;border-radius:50%;background:var(--theme-light-bg);color:var(--theme-active);font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;border:none;line-height:1}
.help-btn:active{opacity:.7}
.chart-btn{background:none;border:none;font-size:14px;cursor:pointer;padding:0 4px;line-height:1}
.chart-btn:active{opacity:.7}
.chart-link{text-align:left;padding:4px 0;font-size:12px;color:var(--theme-active);cursor:pointer;user-select:none;display:inline-block;font-weight:600}
.chart-link:active{opacity:.7}
.chart-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:24px}
.chart-ov.show{opacity:1;pointer-events:auto}
.chart-box{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:600px;max-height:80vh;overflow-y:auto}
.chart-title{font-size:16px;font-weight:600;margin-bottom:12px}
.chart-filter{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.chart-filter span{padding:4px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid rgba(200,215,230,.3);background:rgba(255,255,255,.7);color:#6F7785}
.chart-filter span.on{background:var(--theme-light-bg);color:var(--theme-active);border-color:var(--theme-chip-border);font-weight:600}
.chart-filter span.chart-toggle-all{border:1px solid #D1D5DB;background:#F9FAFB;color:#374151;font-weight:600}
.chart-filter span.chart-toggle-all:hover{background:#F0EDE6}
.chart-label{font-size:11px;color:#6B7280;margin-bottom:4px}
.chart-view-row{display:flex;align-items:center;justify-content:space-between;margin:8px 0 12px;gap:12px}
.chart-seg{position:relative;display:inline-flex;background:rgba(200,215,230,.2);border-radius:999px;padding:3px;user-select:none}
.chart-seg-opt{position:relative;z-index:2;padding:5px 14px;font-size:12px;color:#6F7785;cursor:pointer;transition:color .2s}
.chart-seg-opt.on{color:#fff}
.chart-seg-thumb{position:absolute;top:3px;bottom:3px;width:calc(50% - 3px);background:var(--theme-primary);border-radius:999px;transition:left .2s ease;z-index:1}
.chart-svg{width:100%;height:auto}
.chart-close{margin-top:16px;text-align:right}
.chart-close button{padding:8px 24px;border-radius:24px;border:none;background:var(--t-dark);color:#fff;cursor:pointer;font-weight:600;transition:background .3s}
.detail-tbl{border-collapse:collapse;font-size:13px;white-space:nowrap}
.detail-tbl th{text-align:left;padding:6px 8px;border-bottom:2px solid var(--border);color:var(--text2);font-weight:600;cursor:pointer}
.detail-tbl td{padding:6px 8px;border-bottom:1px solid var(--border)}
.detail-tbl th.al,.detail-tbl td.al{text-align:left}
.detail-tbl b{color:var(--primary)}
.sort-arr{font-size:8px;color:#ccc;vertical-align:middle;margin:0 1px}
.sort-arr.active{color:var(--primary)}
.dlg-msg .detail-tbl{margin-top:4px}
#dlgContent{max-height:60vh;overflow:auto}

/* ========== 治愈系新组件 ========== */

/* 页面头部区域 */
.page-hdr{text-align:center;padding:24px 20px 20px;margin:0 14px 16px}
.page-hdr-badge{display:inline-block;font-size:11px;color:var(--t-main);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;opacity:.8}
.page-hdr-title{font-family:'Noto Serif SC',Georgia,serif;font-size:26px;font-weight:700;color:var(--t-dark);margin-bottom:6px;letter-spacing:.5px}
.page-hdr-sub{font-size:13px;color:#A8A8A8;font-weight:400}

/* 成长感卡片（更轻盈版本） */
.growth-card{background:linear-gradient(135deg,rgba(232,244,248,.6) 0%,rgba(212,235,242,.6) 100%);border-radius:20px;padding:16px 18px;margin:0 14px 12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .2s}
.growth-card:active{transform:scale(.98)}
.growth-icon{width:40px;height:40px;background:rgba(255,255,255,.8);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.growth-content{flex:1}
.growth-title{font-family:'Noto Serif SC',serif;font-size:13px;font-weight:600;color:#2E3138;margin-bottom:2px}

/* 任务卡片（更轻盈版本） */
.task-card{background:linear-gradient(135deg,rgba(255,249,230,.6) 0%,rgba(255,244,214,.6) 100%);border-radius:20px;padding:16px 18px;margin:0 14px 12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .2s}
.task-card:active{transform:scale(.98)}
.task-badge{width:40px;height:40px;background:rgba(255,255,255,.8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:18px;font-weight:700;color:#8B7A2E;flex-shrink:0}
.task-content{flex:1}
.task-title{font-family:'Noto Serif SC',serif;font-size:13px;font-weight:600;color:#2E3138;margin-bottom:2px}
.task-desc{font-size:11px;color:#8B7A2E;font-weight:400}

/* 提示卡 */
.tip-card{background:#FFF;border-radius:20px;padding:14px 16px;margin:0 14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.02)}
.tip-icon{font-size:20px;flex-shrink:0}
.tip-text{flex:1;font-size:12px;color:#888;line-height:1.5}

/* 胶囊分段控制 */
.seg-ctrl{display:flex;background:#F5F5F5;border-radius:20px;padding:4px;margin:0 14px 16px;flex-shrink:0}
.seg-btn{flex:1;padding:8px 14px;border-radius:16px;border:none;background:transparent;font-size:12px;font-weight:500;color:#999;cursor:pointer;transition:all .2s;text-align:center;white-space:nowrap}
.seg-btn.active{background:#FFF;color:#2E3138;box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:600}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="hdr-btn" onclick="openSidebar()" title="行程">&#9776;</button>
      <div>
        <h1>ShareSpend</h1>
        <div id="evName" style="font-size:11px;opacity:.7;margin-top:1px"></div>
      </div>
    </div>
    <div class="hdr-r">
      <button class="hdr-btn" onclick="showManage()" title="设置">&#9881;</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab on" data-tab="exp" onclick="switchTab('exp')">账单</div>
    <div class="tab" data-tab="set" onclick="switchTab('set')">结算</div>
  </div>
  <div class="body" id="body"></div>
  <button class="fab" id="fab" onclick="showAdd()">+</button>
</div>

<div class="sb-ov" id="sbOv" onclick="closeSidebar()"></div>
<div class="sb" id="sb">
  <div class="sb-hdr">
    <h2>我的行程</h2>
    <button type="button" class="hdr-btn" onclick="closeSidebar()" style="background:rgba(255,255,255,.6)">&#10005;</button>
  </div>
  <div class="sb-list" id="sbList"></div>
  <div style="padding:12px 14px 4px">
    <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase">主题色</div>
    <div style="overflow-x:auto;margin:0 -6px;padding:0 6px"><div style="display:flex;flex-wrap:nowrap;gap:8px;padding:6px 2px 8px" id="themePicker"></div></div>
  </div>
  <div class="sb-foot">
    <button type="button" onclick="promptNewEvent()">+ 新建行程</button>
  </div>
</div>

<div class="ov" id="ov" onclick="closeAll()"></div>

<div class="modal" id="mAdd">
  <div class="m-handle"></div>
  <div style="position:relative;display:flex;align-items:center;justify-content:center;padding-bottom:2px">
    <div class="m-title" id="mAddTitle" style="padding-bottom:14px">添加账单</div>
    <button id="historyBtn" onclick="showExpenseHistory()" style="display:none;position:absolute;right:0;top:2px;width:34px;height:34px;border-radius:50%;background:var(--t-accent);border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center" title="历史记录">🕐</button>
  </div>
  <div class="fg">
    <label class="fl">名称</label>
    <input class="fi" id="fName" placeholder="打车到酒店、大皇宫门票、晚餐···" autocomplete="off">
  </div>
  <div class="fg">
    <label class="fl">金额</label>
    <div style="display:flex;gap:8px;align-items:center">
      <select class="cur-sel" id="fCur"></select>
      <input class="fi" id="fAmt" type="number" inputmode="decimal" placeholder="0" step="0.01" min="0" style="flex:1" oninput="this.value=this.value.replace(/[^0-9.]/g,'');if(parseFloat(this.value)<0||this.value==='-')this.value=''">
      <select class="cur-sel" id="fType" style="min-width:80px" onchange="updateTypeLabel()">
        <option value="expense">支出</option>
        <option value="refund">收入</option>
      </select>
      <button class="help-btn" onclick="showTypeHelp()" style="flex-shrink:0">?</button>
    </div>
  </div>
  <div class="fg">
    <label class="fl">日期时间</label>
    <div class="dt-row">
      <input class="fi" id="fDate" type="date">
      <input class="fi" id="fTime" type="time" step="1">
    </div>
  </div>
  <div class="fg">
    <label class="fl">谁付款（默认单人付款）</label>
    <div class="cg" id="gPayer"></div>
    <div class="tgl" id="multiPayerToggle" style="display:none" onclick="toggleMultiPayer()">
      <div class="tgl-sw" id="multiPayerSw"></div>
      <span id="multiPayerLabel">多人参与付款</span>
      <button class="help-btn" onclick="event.stopPropagation();showMultiPayerHelp()" style="margin-left:4px">?</button>
    </div>
    <div id="multiPayerBox" style="display:none">
      <div id="multiPayerList"></div>
      <div class="hint" id="multiPayerHint"></div>
      <div class="hint warn" id="multiPayerDiff" style="display:none"></div>
    </div>
  </div>
  <div class="fg">
    <label class="fl">谁分摊（默认选中成员均分）</label>
    <div class="cg" id="gPart"></div>
    <div class="tgl" id="customToggle" style="display:none" onclick="toggleCustom()">
      <div class="tgl-sw" id="tglSw"></div>
      <span>指定个人金额</span>
      <button class="help-btn" onclick="event.stopPropagation();showCustomHelp()" style="margin-left:4px">?</button>
    </div>
    <div id="customBox" style="display:none">
      <div id="customList"></div>
      <div class="hint" id="customHint"></div>
    </div>
  </div>
  <div class="m-acts">
    <button class="btn" style="background:#F0F2F5;color:#6F7785;border:none;border-radius:24px" onclick="closeAll()">取消</button>
    <button class="btn btn-p" id="saveBtn" onclick="saveExpense()">保存</button>
  </div>
</div>

<div class="modal" id="mManage">
  <div class="m-handle"></div>
  <div class="m-title">设置</div>
  <div class="fg">
    <label class="fl">行程名称</label>
    <input class="fi" id="evNameInput" placeholder="如：毕业旅行；公园野餐···">
    <div class="fg-err" id="evNameErr" style="display:none"></div>
  </div>
  <div class="fg">
    <label class="fl">成员管理</label>
    <div class="cg" id="gPeople"></div>
    <div class="fr" style="margin-top:8px">
      <input class="fi" id="newName" placeholder="输入名字，逗号分隔批量添加" onkeydown="if(event.key==='Enter'){event.preventDefault();addPerson()}">
      <button class="btn btn-p" style="flex:0 0 auto;padding:11px 20px" onclick="addPerson()">添加</button>
    </div>
  </div>
  <div class="fg">
    <label class="fl">本位币</label>
    <div class="cur-search-wrap" id="baseCurWrap">
      <input class="fi cur-search-input" id="baseCurInput" placeholder="搜索币种：美元、USD、美国..." autocomplete="off" onfocus="showCurSearch('base')" oninput="filterCurSearch('base')">
      <div class="cur-search-drop" id="baseCurDrop"></div>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-top:4px">限填一种币种，支持模糊搜索</div>
  </div>
  <div class="fg">
    <label class="fl">外币币种（选填）</label>
    <div class="cur-chips-box" id="curChipsBox"></div>
    <div class="cur-search-wrap" id="curListWrap">
      <input class="fi cur-search-input" id="curListInput" placeholder="搜索添加：英镑、EUR、德国..." autocomplete="off" onfocus="showCurSearch('list')" oninput="filterCurSearch('list')">
      <div class="cur-search-drop" id="curListDrop"></div>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-top:4px">点击已添加的币种可删除，支持模糊搜索</div>
  </div>
  <div class="fg">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
      <label class="fl" style="margin-bottom:0">邀请微信用户</label>
      <button class="help-btn" onclick="showInviteHelp()">?</button>
    </div>
    <div style="background:var(--t-accent);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer" onclick="inviteFriend()">
      <div style="width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🔗</div>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text)">邀请微信好友加入</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">好友加入后可共同记账</div>
      </div>
    </div>
  </div>
  <div class="m-acts">
    <button class="btn btn-s" onclick="saveSettings()">保存</button>
  </div>
  <div class="m-acts" style="margin-top:8px;border-top:none;padding-top:0">
    <button class="btn btn-w" onclick="exportData()">导出数据</button>
    <button class="btn btn-d" onclick="clearAll()">清空账单</button>
  </div>

</div>

<div class="ov" id="settleOv" onclick="closeSettleModal()"></div>
<div class="settle-modal" id="mSettleResult">
  <div class="sm-handle"></div>
  <div style="display:flex;align-items:center;justify-content:center;position:relative;padding:2px 0 14px">
    <div class="sm-title">结算完成</div>
    <button onclick="shareSettle()" title="分享结算单" style="position:absolute;right:0;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:var(--t-accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .15s,background .2s" onmousedown="this.style.transform='translateY(-50%) scale(.88)'" onmouseup="this.style.transform='translateY(-50%) scale(1)'" ontouchstart="this.style.transform='translateY(-50%) scale(.88)'" ontouchend="this.style.transform='translateY(-50%) scale(1)'">📤</button>
  </div>
  <div id="settleResultBody"></div>
  <button class="sm-done" onclick="closeSettleModal()">完成</button>
</div>

<div class="dlg-ov" id="dlgOv" onclick="if(event.target===this)closeDialog()">
  <div class="dlg">
    <div style="position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:8px">
      <div class="dlg-title" id="dlgTitle" style="margin-bottom:0;flex:1;text-align:center"></div>
      <button id="dlgShareBtn" onclick="shareSettle()" title="分享结算单" style="display:none;position:absolute;right:0;width:32px;height:32px;border-radius:50%;background:var(--t-accent);border:none;cursor:pointer;font-size:15px;align-items:center;justify-content:center;transition:transform .15s" onmousedown="this.style.transform='scale(.88)'" onmouseup="this.style.transform='scale(1)'" ontouchstart="this.style.transform='scale(.88)'" ontouchend="this.style.transform='scale(1)'">📤</button>
    </div>
    <div class="dlg-msg" id="dlgMsg"></div>
    <div id="dlgContent" style="display:none;margin-bottom:16px"></div>
    <input class="dlg-input" id="dlgInput" style="display:none" autocomplete="off">
    <div class="dlg-err" id="dlgErr" style="display:none"></div>
    <div class="dlg-acts" id="dlgActs"></div>
  </div>
</div>

<div class="chart-ov" id="chartOv" onclick="if(event.target===this)closeChart()">
  <div class="chart-box">
    <div class="chart-title">支出趋势</div>
    <div class="chart-label">币种</div>
    <div class="chart-filter" id="chartFilter"></div>
    <div class="chart-label">成员</div>
    <div class="chart-filter" id="chartPeopleFilter"></div>
    <div class="chart-view-row">
      <span class="chart-label" style="margin:0">视图</span>
      <div class="chart-seg" id="chartZoomSeg">
        <span class="chart-seg-opt on" data-v="0" onclick="setChartZoom(false)">全貌</span>
        <span class="chart-seg-opt" data-v="1" onclick="setChartZoom(true)">放大</span>
        <span class="chart-seg-thumb" style="left:0"></span>
      </div>
    </div>
    <div id="chartBody"></div>
    <div class="chart-close"><button onclick="closeChart()">关闭</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

const CLOUD_API = 'https://cloud1-d7gnf4smob484df5d-1444151314.ap-shanghai.app.tcloudbase.com/api';

async function callCloud(action, data) {
  let openid = sessionStorage.getItem('aa_openid') || '';
  toast('请求: ' + action + ' openid=' + (openid ? '有' : '无'), 6000);
  try {
    const res = await fetch(CLOUD_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, data, openid })
    });
    toast('响应状态: ' + res.status, 6000);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    toast('结果: ' + JSON.stringify(json).slice(0, 50), 6000);
    return json;
  } catch(e) {
    toast('❌ fetch失败: ' + e.message, 8000);
    throw e;
  }
}

let _saveTimer = null;

async function persistCloud() {
  // 节流：500ms内只保存一次
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    let ev = cur();
    if (!ev || !_currentTripId) return;
    try {
      await callCloud('updateTrip', {
        tripId: _currentTripId,
        name: ev.name,
        people: ev.people,
        baseCur: ev.baseCur,
        currencies: ev.currencies,
        exchangeRates: ev.exchangeRates
      });
    } catch(e) { console.warn('云端保存失败', e); }
  }, 500);
}

async function saveBillCloud(bill, isEdit) {
  let ev = cur();
  if (!_currentTripId) return;
  if (isEdit) {
    await callCloud('updateBill', {
      billId: bill._cloudId || bill.id,
      bill: bill,
      createdByName: CURRENT_USER.name
    });
  } else {
    let res = await callCloud('addBill', {
      tripId: _currentTripId,
      bill: bill,
      createdByName: CURRENT_USER.name
    });
    if (res && res.code === 0) bill._cloudId = res.data._id;
  }
}

async function loadFromCloud() {
  try {
    toast('加载中…');
    let openid = sessionStorage.getItem('aa_openid') || '';
    if (!openid) { toast('❌ 无openid，请重新登录'); initLocal(); return; }
    let res;
    try {
      res = await callCloud('getTrips', {});
    } catch(fetchErr) {
      toast('❌ 网络错误: ' + fetchErr.message);
      initLocal(); return;
    }
    if (!res || res.code !== 0) { toast('❌ 云端错误: ' + (res && res.msg || '未知')); initLocal(); return; }
    if (res && res.code === 0 && res.data.length > 0) {
      // 把云端行程映射到本地数据结构
      S.events = res.data.map(t => ({
        id: t._id,
        _cloudId: t._id,
        name: t.name,
        ownerId: t.ownerId,
        people: t.people || [],
        baseCur: t.baseCur || 'RMB',
        currencies: t.currencies || [],
        exchangeRates: t.exchangeRates || {},
        expenses: [],
        members: t.members || []
      }));
      S.currentEventId = S.events[0].id;
      _currentTripId = S.events[0]._cloudId;
      // 加载当前行程的账单
      await loadBillsForTrip(_currentTripId);
    } else {
      // 没有行程，保持空状态
      S.events = [{ id: uid(), name: '', people: [], baseCur: 'RMB', currencies: [], exchangeRates: {}, expenses: [],
        ownerId: CURRENT_USER.id,
        members: [{ userId: CURRENT_USER.id, name: CURRENT_USER.name, role: 'owner', joinedAt: new Date().toISOString() }]
      }];
      S.currentEventId = S.events[0].id;
    }
    // 检查是否有待加入的行程
    let joinTripId = sessionStorage.getItem('aa_joinTripId');
    if (joinTripId) {
      sessionStorage.removeItem('aa_joinTripId');
      await handleJoinTrip(joinTripId);
    }
    render();
  } catch(e) {
    console.warn('云端加载失败，使用本地模式', e);
    initLocal();
  }
}

async function loadBillsForTrip(tripId) {
  try {
    let res = await callCloud('getBills', { tripId });
    if (res && res.code === 0) {
      let ev = S.events.find(e => e._cloudId === tripId);
      if (ev) {
        ev.expenses = res.data.map(b => ({ ...b, id: b._id, _cloudId: b._id }));
        ev.expenses = migrateExpenses(ev.expenses);
      }
    }
  } catch(e) { console.warn('账单加载失败', e); }
}

async function handleJoinTrip(tripId) {
  try {
    let res = await callCloud('joinTrip', {
      tripId,
      name: CURRENT_USER.name,
      avatar: CURRENT_USER.avatar

  } catch(e) { toast('加入行程失败'); }
}

/* ── 权限辅助函数（小程序接入后后端会下发 role，此处为本地降级） ── */
function isOwner(ev) {
  ev = ev || cur();
  return !ev || !ev.ownerId || ev.ownerId === CURRENT_USER.id;
}
function canEditExpense(e) {
  /* Owner 可编辑所有；Member 只能编辑自己创建的 */
  if (isOwner()) return true;
  return !e.createdBy || e.createdBy === CURRENT_USER.id;
}

function cur() {
  let ev = S.events.find(e => e.id === S.currentEventId);
  if (!ev && S.events.length > 0) { ev = S.events[0]; S.currentEventId = ev.id; }
  return ev;
}

function toBase(amount, currency) {
  let ev = cur();
  let bc = (ev && ev.baseCur) || 'RMB';
  if (!ev || currency === bc) return amount;
  let rate = ev.exchangeRates[currency];
  if (rate && rate > 0) return amount * rate;
  return amount;
}

function fmtBase(n) {
  let ev = cur();
  let bc = (ev && ev.baseCur) || 'RMB';
  return bc + ' ' + Number(n).toFixed(2);
}

function initLocal() {
  let saved = sessionStorage.getItem('aa_data');
  if (saved) {
    try {
      let d = JSON.parse(saved);
      if (d.events && d.events.length > 0) {
        S.events = d.events.map(ev => {
          ev.expenses = migrateExpenses(ev.expenses || []);
          if (!ev.exchangeRates) ev.exchangeRates = {};
          if (!ev.people || ev.people.length === 0) ev.people = ['A', 'B', 'C'];
          if (!ev.baseCur) { ev.baseCur = 'RMB'; if (ev.currencies) ev.currencies = ev.currencies.filter(c => c !== 'RMB'); }
          if (!ev.currencies || ev.currencies.length === 0) ev.currencies = ['THB', 'USD'];
          return ev;
        });
        S.currentEventId = d.currentEventId || S.events[0].id;
      }
    } catch(e) {}
  }
  if (!S.events || S.events.length === 0) {
    S.events = [{ id: uid(), name: '', people: [], baseCur: 'RMB', currencies: [], exchangeRates: {}, expenses: [],
      ownerId: CURRENT_USER.id,
      members: [{ userId: CURRENT_USER.id, name: CURRENT_USER.name, role: 'owner', joinedAt: new Date().toISOString() }]
    }];
    S.currentEventId = S.events[0].id;
  }
  if (!S.events.find(e => e.id === S.currentEventId)) S.currentEventId = S.events[0].id;
  render();
}

function migrateExpenses(arr) {
  return arr.map(e => {
    if (!e.currency) e.currency = 'THB';
    if (!e.time) e.time = '00:00';
    if (e.custom) {
      let nc = {};
      Object.keys(e.custom).forEach(k => {
        let v = e.custom[k];
        nc[k] = (typeof v === 'object' && v !== null && 'amount' in v) ? v : { amount: Number(v), alsoSplit: false };
      });
      e.custom = nc;
    }
    return e;
  });
}

function persistLocal() {
  try { sessionStorage.setItem('aa_data', JSON.stringify({ events: S.events, currentEventId: S.currentEventId })); } catch(e) {}
}

function todayStr() { let d=new Date(),m=d.getMonth()+1,day=d.getDate(); return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(day<10?'0':'')+day; }
function nowTimeStr() { let d=new Date(),h=d.getHours(),m=d.getMinutes(),s=d.getSeconds(); return (h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s; }
function fmt(n, c) { return (c || 'THB') + ' ' + Number(n).toFixed(2); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function expDatetime(e) { return e.date + ' ' + (e.time || '00:00'); }
function toast(msg, duration) { let t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), duration || 6000); }

function buildDateChips(dates, filterSet, toggleFn, label) {
  let h = '<div class="sec"><span class="sec-title">' + label + '</span>';
  h += '<div class="dchip' + (filterSet.size === 0 ? ' on' : '') + '" onclick="' + toggleFn + '(null)">全部</div>';
  dates.forEach(d => { h += '<div class="dchip' + (filterSet.has(d) ? ' on' : '') + '" onclick="' + toggleFn + '(\'' + d + '\')">' + d.slice(5) + '</div>'; });
  h += '</div>';
  return h;
}

  if (dates.length > 0) h += buildDateChips(dates, S.filterDates, 'toggleFilterDate', '筛选日期');
  let list = S.filterDates.size > 0 ? ev.expenses.filter(e => S.filterDates.has(e.date)) : ev.expenses;

  if (list.length > 0) {
    h += renderStatCard(ev, list);
  }

  if (!ev.name || ev.name === '') {
    h += '<div class="empty" style="padding:80px 20px">';
    h += '<div class="empty-i">✈️</div>';
    h += '<div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px">目前还没有行程</div>';
    h += '<div style="font-size:13px;color:#999;margin-bottom:20px">创建你的第一个行程，开始 AA 记账吧</div>';
    h += '<button onclick="createNewTrip()" style="padding:12px 32px;border-radius:24px;border:none;background:#5B96B5;color:#fff;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.1)">+ 新建行程</button>';
    h += '</div>';
  } else if (ev.people.length === 0) {
    h += '<div class="empty"><div class="empty-i">👋</div>还没有成员<br>点击右上角 ⚙ 添加行程伙伴</div>';
  } else if (list.length === 0) {
    h += '<div class="empty"><div class="empty-i">📝</div>还没有账单<br>点击 + 添加第一笔</div>';
  } else {
    h += '<div class="card">';
    let unsettled = list.filter(e => !e.settled).sort((a, b) => expDatetime(b).localeCompare(expDatetime(a)));
    let settledList = list.filter(e => e.settled).sort((a, b) => expDatetime(b).localeCompare(expDatetime(a)));
    unsettled.concat(settledList).forEach(e => {
      let parts = calcShares(e);
      let settled = e.settled ? ' settled' : '';
      let timeStr = e.time ? ' ' + e.time : '';
      h += '<div class="ei' + settled + '">';
      h += '<div class="ei-row" onclick="toggleExpand(\'' + e.id + '\')">';
      h += '<span class="ei-arrow-left" id="arrow-' + e.id + '">▶</span>';
      h += '<div class="ei-body">';
      h += '<div class="ei-name">' + esc(e.name) + (e.type === 'refund' || e.amount < 0 ? ' <span style="font-size:10px;background:rgba(245,216,122,.3);color:#8B7A2E;padding:2px 8px;border-radius:10px;font-weight:500;vertical-align:middle;margin-left:6px">收入</span>' : '') + '</div>';
      let payerDisplay = e.multiPayments ? Object.keys(e.multiPayments).join('、') : e.payer;
      h += '<div class="ei-meta"><span style="white-space:nowrap">时间：' + e.date + timeStr + '</span></div>';
      h += '<div class="ei-meta">' + (e.type === 'refund' || e.amount < 0 ? '收款人' : '付款人') + '：' + payerDisplay + '</div>';
      h += '</div><div class="ei-r">';
      let isRefund = e.type === 'refund' || e.amount < 0;
      let amtDisplay = isRefund
        ? '<div class="ei-amt" style="color:var(--success)">' + fmt(Math.abs(e.amount), e.currency) + '</div>'
        : '<div class="ei-amt">' + fmt(e.amount, e.currency) + '</div>';
      h += amtDisplay;
      if (!e.settled) {
        h += '<div class="ei-acts" onclick="event.stopPropagation()">';
        h += '<button class="ei-btn" onclick="editExpense(\'' + e.id + '\')" title="编辑">✎</button>';
        h += '<button class="ei-btn del" onclick="delExpense(\'' + e.id + '\')" title="删除">✕</button>';
        h += '</div>';
      }
      h += '</div></div>';
      h += '<div class="ei-detail" onclick="toggleExpand(\'' + e.id + '\')">分摊人：' + parts.map(p => p.name).join('、') + '</div>';
      // Expandable detail
      h += '<div class="ei-expand" id="expand-' + e.id + '">';
      h += '<table class="ei-expand-tbl"><tr><th>成员</th><th>分摊金额</th></tr>';
      parts.forEach(p => {
        h += '<tr><td>' + esc(p.name) + '</td><td><b>' + fmt(p.amount, e.currency) + '</b></td></tr>';
      });
      h += '</table>';
      h += '</div>';
      h += '</div>';
    });
    h += '</div>';
  }
  el.innerHTML = h;
}

function renderStatCard(ev, list) {
  let baseCur = ev.baseCur || 'RMB';
  let sType = S.statType || 'consume';

  let defaults = RATE_DEFAULTS;
  let usedCurs = [...new Set(list.map(e => e.currency))].filter(c => c !== baseCur);
  usedCurs.forEach(c => {
    if (!ev.exchangeRates[c] && defaults[c]) { ev.exchangeRates[c] = defaults[c]; persistLocal(); }
  });

  let allCurs = [...new Set(list.map(e => e.currency))];
  let foreignCurs = allCurs.filter(c => c !== baseCur);
  let hasForeign = foreignCurs.length > 0;

  let data = {};
  ev.people.forEach(p => { data[p] = {}; allCurs.forEach(c => data[p][c] = 0); });

  if (sType === 'consume') {
    list.forEach(e => {
      calcShares(e).forEach(s => {
        if (Math.abs(s.amount) >= 0.01) data[s.name][e.currency] = (data[s.name][e.currency] || 0) + s.amount;
      });
    });
  } else {
    list.forEach(e => {
      if (e.multiPayments && Object.keys(e.multiPayments).length > 0) {
        Object.entries(e.multiPayments).forEach(([payer, payAmt]) => {
          data[payer][e.currency] = (data[payer][e.currency] || 0) + payAmt;
        });
      } else {
        data[e.payer][e.currency] = (data[e.payer][e.currency] || 0) + e.amount;
      }
    });
  }

  let baseTotals = {};
  ev.people.forEach(p => {
    baseTotals[p] = 0;
    allCurs.forEach(c => { baseTotals[p] += toBase(data[p][c] || 0, c); });
  });

  let h = '<div class="stat-card">';
  h += '<div class="stat-hdr"><div class="stat-hdr-l"><span class="stat-icon">📊</span><span>支出统计</span><button class="help-btn" onclick="showStatHelp()">?</button></div>';

  // 胶囊分段控制放右上角
  h += '<div class="seg-ctrl" style="margin:0">';
  h += '<button class="seg-btn' + (sType === 'payment' ? ' active' : '') + '" onclick="toggleStatType(\'payment\')">我当场付款</button>';
  h += '<button class="seg-btn' + (sType === 'consume' ? ' active' : '') + '" onclick="toggleStatType(\'consume\')">AA后我承担</button>';
  h += '</div></div>';

  let colCurs = hasForeign ? [baseCur, ...foreignCurs] : [baseCur];

  h += '<div class="stat-grid"><table class="stat-tbl">';
  h += '<tr><th>成员</th>';
  colCurs.forEach(c => h += '<th>原币-' + esc(c) + '</th>');
  if (hasForeign) h += '<th style="border-left:1px solid var(--t-main)">汇总(转' + baseCur + ')</th>';
  h += '</tr>';

  ev.people.forEach(p => {
    let hasAny = allCurs.some(c => Math.abs(data[p][c] || 0) >= 0.01);
    if (hasAny) {
      h += '<tr><td class="clickable-name" onclick="showPersonDetail(\'' + esc(p) + '\')">' + esc(p) + '</td>';
      colCurs.forEach(c => {
        let v = data[p][c] || 0;
        h += '<td>' + (Math.abs(v) >= 0.01 ? '<b>' + Number(v).toFixed(2) + '</b>' : '-') + '</td>';
      });
      if (hasForeign) {
        h += '<td style="border-left:1px solid var(--t-main)"><b>' + Number(baseTotals[p]).toFixed(2) + '</b></td>';
      }
      h += '</tr>';
    }
  });

  h += '</table></div>';
  h += '<div class="stat-foot">';
  h += '<div class="stat-hint">点击成员名字可查看详情</div>';
  h += '<div class="chart-link" onclick="showStatChart()">📈 查看趋势图</div>';
  h += '</div>';
  h += '</div>';
  return h;
}

function toggleStatType(type) {
  S.statType = type;
  S.statCur = (type === 'payment') ? 'original' : 'base';
  render();

function positionStatThumb() {

  thumb.style.left = (spanRect.left - togRect.left) + 'px';

let S_chartCur = null;
let S_chartPeople = null;
let S_chartZoom = false;
let chartDaySort = {dir: 'asc'};
let chartDayPerson = null, chartDayDate = null;

function showStatChart() {
  let ev = cur();
  let baseCur = ev.baseCur || 'RMB';
  let list = S.filterDates.size > 0 ? ev.expenses.filter(e => S.filterDates.has(e.date)) : ev.expenses;
  if (list.length === 0) { toast('暂无数据'); return; }
  let allCurs = [...new Set(list.map(e => e.currency))];
  if (!S_chartCur || !allCurs.includes(S_chartCur)) S_chartCur = allCurs[0];
  if (!S_chartPeople) S_chartPeople = new Set(ev.people);

  // Currency filter
  let fh = '';
  allCurs.forEach(c => {
    fh += '<span class="' + (!S_chartConvert && c === S_chartCur ? 'on' : '') + '" onclick="pickChartCur(\'' + esc(c) + '\')">' + esc(c) + '</span>';
  });
  fh += '<span class="' + (S_chartConvert ? 'on' : '') + '" onclick="toggleChartConvert()">转' + baseCur + '</span>';
  document.getElementById('chartFilter').innerHTML = fh;

  // People filter
  let ph = '';
  ev.people.forEach(p => {
    ph += '<span class="' + (S_chartPeople.has(p) ? 'on' : '') + '" onclick="toggleChartPerson(\'' + esc(p) + '\')">' + esc(p) + '</span>';
  });
  let allSelected = ev.people.every(p => S_chartPeople.has(p));
  ph += '<span class="chart-toggle-all" onclick="toggleAllChartPeople()">' + (allSelected ? '全不选' : '全选') + '</span>';
  document.getElementById('chartPeopleFilter').innerHTML = ph;

  // Sync zoom segmented control
  let seg = document.getElementById('chartZoomSeg');
  if (seg) {
    seg.querySelectorAll('.chart-seg-opt').forEach(o => o.classList.toggle('on', (o.dataset.v === '1') === S_chartZoom));
    let thumb = seg.querySelector('.chart-seg-thumb');
    if (thumb) thumb.style.left = S_chartZoom ? '50%' : '3px';
  }

  // Aggregate data: per person per date
  let sType = S.statType || 'consume';
  let dateMap = {};
  let filteredList = S_chartConvert ? list : list.filter(e => e.currency === S_chartCur);
  filteredList.forEach(e => {
    if (!dateMap[e.date]) dateMap[e.date] = {};
    let convert = S_chartConvert ? toBase : (amt) => amt;
    if (sType === 'consume') {
      calcShares(e).forEach(s => {
        if (!dateMap[e.date][s.name]) dateMap[e.date][s.name] = 0;
        dateMap[e.date][s.name] += convert(s.amount, e.currency);
      });
    } else {
      if (!dateMap[e.date][e.payer]) dateMap[e.date][e.payer] = 0;
      dateMap[e.date][e.payer] += convert(e.amount, e.currency);
    }
  });

  let dates = Object.keys(dateMap).sort();
  if (dates.length === 0) { document.getElementById('chartBody').innerHTML = '<div style="text-align:center;color:#999;padding:40px">该币种暂无数据</div>'; document.getElementById('chartOv').classList.add('show'); return; }

  let people = ev.people.filter(p => S_chartPeople.has(p) && dates.some(d => dateMap[d] && dateMap[d][p]));
  let colors = ['#7BABC8','#8BC4A0','#F5D87A','#EFA184','#A89BC8','#6B8A8A','#C07860','#5B96B5'];

  // Find max value for scaling
  let maxVal = 0;
  dates.forEach(d => people.forEach(p => { let v = (dateMap[d] && dateMap[d][p]) || 0; if (v > maxVal) maxVal = v; }));
  if (maxVal === 0) maxVal = 1;

  let W = S_chartZoom ? Math.max(500, dates.length * 80) : 500, H = 240, padL = 50, padR = 20, padT = 20, padB = 40;
  let plotW = W - padL - padR, plotH = H - padT - padB;

  // Y axis ticks
  let yTicks = 5;
  let yStep = Math.ceil(maxVal / yTicks / 10) * 10 || 1;
  let yMax = yStep * yTicks;

  let svg = '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '"' + (S_chartZoom ? ' style="min-width:' + W + 'px"' : '') + ' xmlns="http://www.w3.org/2000/svg">';

  // Grid lines and Y labels
  for (let i = 0; i <= yTicks; i++) {
    let y = padT + plotH - (i / yTicks) * plotH;
    let val = (yMax * i / yTicks);
    svg += '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="#E5E7EB" stroke-width="1"/>';
    svg += '<text x="' + (padL - 6) + '" y="' + (y + 4) + '" text-anchor="end" fill="#9CA3AF" font-size="10">' + (val >= 1000 ? (val/1000).toFixed(1) + 'k' : val.toFixed(0)) + '</text>';
  }

  // X labels
  let xStep = dates.length > 1 ? plotW / (dates.length - 1) : 0;
  let xBase = dates.length === 1 ? padL + plotW / 2 : padL;
  dates.forEach((d, i) => {
    let x = xBase + i * xStep;
    let label = d.slice(5); // MM-DD
    svg += '<text x="' + x + '" y="' + (H - padB + 16) + '" text-anchor="middle" fill="#9CA3AF" font-size="9">' + label + '</text>';
  });

  // Lines and dots
  people.forEach((p, pi) => {
    let color = colors[pi % colors.length];
    let points = [];
    dates.forEach((d, i) => {
      let v = (dateMap[d] && dateMap[d][p]) || 0;
      let x = xBase + i * xStep;
      let y = padT + plotH - (v / yMax) * plotH;
      points.push({ x, y, v, d });
    });

    // Line
    if (points.length > 1) {
      let path = points.map((pt, i) => (i === 0 ? 'M' : 'L') + pt.x.toFixed(1) + ',' + pt.y.toFixed(1)).join(' ');
      svg += '<path d="' + path + '" fill="none" stroke="' + color + '" stroke-width="2"/>';
    }

    // Dots
    points.forEach(pt => {
      svg += '<circle cx="' + pt.x.toFixed(1) + '" cy="' + pt.y.toFixed(1) + '" r="4.5" fill="' + color + '" style="cursor:pointer" onclick="event.stopPropagation();showChartDayDetail(\'' + esc(p) + '\',\'' + pt.d + '\')"/>';
      if (pt.v > 0) {
        svg += '<text x="' + pt.x.toFixed(1) + '" y="' + (pt.y - 8).toFixed(1) + '" text-anchor="middle" fill="' + color + '" font-size="9" font-weight="600" style="pointer-events:none">' + pt.v.toFixed(0) + '</text>';
      }
    });
  });

  svg += '</svg>';

  // Legend
  let legend = '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:11px">';
  people.forEach((p, pi) => {
    legend += '<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:' + colors[pi % colors.length] + ';display:inline-block"></span>' + esc(p) + '</span>';
  });
  legend += '</div>';

  document.getElementById('chartBody').innerHTML = '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch">' + svg + '</div>' + legend + '<div style="font-size:11px;color:#9CA3AF;margin-top:8px;text-align:center">点击趋势图上的圆点可查看详情</div>';
  document.getElementById('chartOv').classList.add('show');
}

function pickChartCur(c) { S_chartCur = c; S_chartConvert = false; showStatChart(); }
function toggleChartPerson(p) {
  if (!S_chartPeople) S_chartPeople = new Set(cur().people);
  if (S_chartPeople.has(p)) S_chartPeople.delete(p); else S_chartPeople.add(p);
  showStatChart();
}
function toggleAllChartPeople() {
  let ev = cur();
  if (!S_chartPeople) S_chartPeople = new Set(ev.people);
  let allSelected = ev.people.every(p => S_chartPeople.has(p));
  if (allSelected) {
    S_chartPeople.clear();
  } else {
    S_chartPeople = new Set(ev.people);
  }
  showStatChart();
}
let S_chartConvert = true;
function toggleChartConvert() { S_chartConvert = !S_chartConvert; showStatChart(); }
function setChartZoom(v) { S_chartZoom = !!v; showStatChart(); }
function toggleChartZoom() { S_chartZoom = !S_chartZoom; showStatChart(); }
function closeChart() { document.getElementById('chartOv').classList.remove('show'); S_chartPeople = null; chartDaySort = {dir: 'asc'}; chartDayPerson = null; chartDayDate = null; }

function showChartDayDetail(person, date) {
  chartDayPerson = person;
  chartDayDate = date;
  let ev = cur();
  let baseCur = ev.baseCur || 'RMB';
  let list = ev.expenses.filter(e => e.date === date);
  if (list.length === 0) { toast('该日无记录'); return; }

  let asPayer = [];
  list.forEach(e => {
    if (e.multiPayments && e.multiPayments[person]) {
      asPayer.push({ exp: e, payAmt: e.multiPayments[person] });
    } else if (e.payer === person && (!e.multiPayments || Object.keys(e.multiPayments).length === 0)) {
      asPayer.push({ exp: e, payAmt: e.amount });
    }
  });
  let asSplitter = [];
  list.forEach(e => {
    let shares = calcShares(e);
    let s = shares.find(x => x.name === person);
    if (s && Math.abs(s.amount) >= 0.01) asSplitter.push({ exp: e, share: s.amount });
  });

  let sortDir = chartDaySort.dir === 'asc' ? 1 : -1;
  let arrowUp = chartDaySort.dir === 'asc' ? ' active' : '';
  let arrowDown = chartDaySort.dir === 'desc' ? ' active' : '';
  let arrow = ' <span class="sort-arr' + arrowUp + '">▲</span><span class="sort-arr' + arrowDown + '">▼</span>';

  asPayer.sort((a, b) => (toBase(a.payAmt, a.exp.currency) - toBase(b.payAmt, b.exp.currency)) * sortDir);
  asSplitter.sort((a, b) => (toBase(a.share, a.exp.currency) - toBase(b.share, b.exp.currency)) * sortDir);

  let h = '<div style="font-size:13px;font-weight:600;margin-bottom:8px">' + esc(person) + ' · ' + date + '</div>';

  let sType = S.statType || 'consume';

  if (sType === 'payment' && asPayer.length > 0) {
    h += '<div style="font-size:11px;color:var(--t-main);font-weight:600;margin:8px 0 4px">我当场付款</div>';
    h += '<table class="detail-tbl"><tr><th>账单</th><th onclick="sortChartDay()">转' + baseCur + arrow + '</th><th>付款额</th></tr>';
    let totalOrig = {}, totalBase = 0;
    asPayer.forEach(item => {
      h += '<tr><td>' + esc(item.exp.name) + '</td><td><b>' + fmtBase(toBase(item.payAmt, item.exp.currency)) + '</b></td><td><b>' + fmt(item.payAmt, item.exp.currency) + '</b></td></tr>';
      totalOrig[item.exp.currency] = (totalOrig[item.exp.currency] || 0) + item.payAmt;
      totalBase += toBase(item.payAmt, item.exp.currency);
    });
    h += '<tr style="background:var(--t-accent);font-weight:700"><td>汇总</td><td><b>' + fmtBase(totalBase) + '</b></td><td><b>' + Object.entries(totalOrig).map(([c,v]) => fmt(v,c)).join(' + ') + '</b></td></tr>';
    h += '</table>';
  } else if (sType === 'payment' && asPayer.length === 0) {
    h += '<div style="color:var(--text2);font-size:13px;padding:12px 0">该日无付款记录</div>';
  }

  if (sType === 'consume' && asSplitter.length > 0) {
    h += '<div style="font-size:11px;color:var(--t-main);font-weight:600;margin:8px 0 4px">AA后我承担</div>';
    h += '<table class="detail-tbl"><tr><th>账单</th><th onclick="sortChartDay()">转' + baseCur + arrow + '</th><th>分摊额</th></tr>';
    let totalOrig = {}, totalBase = 0;
    asSplitter.forEach(item => {
      h += '<tr><td>' + esc(item.exp.name) + '</td><td><b>' + fmtBase(toBase(item.share, item.exp.currency)) + '</b></td><td><b>' + fmt(item.share, item.exp.currency) + '</b></td></tr>';
      totalOrig[item.exp.currency] = (totalOrig[item.exp.currency] || 0) + item.share;
      totalBase += toBase(item.share, item.exp.currency);
    });
    h += '<tr style="background:var(--t-accent);font-weight:700"><td>汇总</td><td><b>' + fmtBase(totalBase) + '</b></td><td><b>' + Object.entries(totalOrig).map(([c,v]) => fmt(v,c)).join(' + ') + '</b></td></tr>';
    h += '</table>';
  } else if (sType === 'consume' && asSplitter.length === 0) {
    h += '<div style="color:var(--text2);font-size:13px;padding:12px 0">该日无分摊记录</div>';
  }

  showDialog({ title: '当日记录', content: h, cancel: false, okText: '确定', okClass: 'dlg-btn-ok', onOk: function(){} });
}

function sortChartDay() {
  chartDaySort.dir = chartDaySort.dir === 'asc' ? 'desc' : 'asc';

function showPersonDetail(person) {
  let ev = cur();
  let baseCur = ev.baseCur || 'RMB';
  let sType = S.statType || 'consume';
  let list = S.filterDates.size > 0 ? ev.expenses.filter(e => S.filterDates.has(e.date)) : ev.expenses;
  if (list.length === 0) { toast('暂无数据'); return; }

  let rows = [];
  if (sType === 'consume') {
    list.forEach(e => {
      let shares = calcShares(e);
      shares.forEach(s => {
        if (s.name === person && Math.abs(s.amount) >= 0.01) {
          rows.push({ name: e.name, date: e.date, origAmt: s.amount, baseAmt: toBase(s.amount, e.currency), currency: e.currency });
        }
      });
    });
  } else {
    list.forEach(e => {
      if (e.multiPayments && e.multiPayments[person]) {
        rows.push({ name: e.name, date: e.date, origAmt: e.multiPayments[person], baseAmt: toBase(e.multiPayments[person], e.currency), currency: e.currency });
      } else if (e.payer === person && (!e.multiPayments || Object.keys(e.multiPayments).length === 0)) {
        if (Math.abs(e.amount) >= 0.01) {
          rows.push({ name: e.name, date: e.date, origAmt: e.amount, baseAmt: toBase(e.amount, e.currency), currency: e.currency });
        }
      }
    });
  }

  // Sort
  let col = detailSort.col, dir = detailSort.dir === 'asc' ? 1 : -1;
  rows.sort((a, b) => {
    if (col === 'date') return a.date.localeCompare(b.date) * dir;
    if (col === 'orig') {
      let c = a.currency.localeCompare(b.currency) * dir;
      if (c !== 0) return c;
      return (a.origAmt - b.origAmt) * dir;
    }
    if (col === 'base') return (a.baseAmt - b.baseAmt) * dir;
    return 0;
  });

  let title = person + (sType === 'consume' ? ' AA承担明细' : ' 当场付款明细');
  let arrow = (c) => {
    if (detailSort.col === c) return detailSort.dir === 'asc' ? ' <span class="sort-arr active">▲</span><span class="sort-arr">▼</span>' : ' <span class="sort-arr">▲</span><span class="sort-arr active">▼</span>';
    return ' <span class="sort-arr">▲</span><span class="sort-arr">▼</span>';
  };
  let h = '<table class="detail-tbl">';
  h += '<tr><th onclick="sortDetail(\'date\')">日期' + arrow('date') + '</th><th>账单</th>';
  h += '<th class="al" onclick="sortDetail(\'base\')">转' + baseCur + arrow('base') + '</th>';
  h += '<th class="al" onclick="sortDetail(\'orig\')">原币' + arrow('orig') + '</th></tr>';
  let totalOrig = {}, totalBase = 0;
  rows.forEach(r => {
    h += '<tr><td>' + r.date.slice(5) + '</td><td>' + esc(r.name) + '</td>';
    h += '<td class="al"><b>' + fmtBase(r.baseAmt) + '</b></td>';
    h += '<td class="al"><b>' + fmt(r.origAmt, r.currency) + '</b></td></tr>';
    totalOrig[r.currency] = (totalOrig[r.currency] || 0) + r.origAmt;
    totalBase += r.baseAmt;
  });
  h += '<tr style="background:var(--t-accent);font-weight:700"><td colspan="2">汇总</td>';
  h += '<td class="al"><b>' + fmtBase(totalBase) + '</b></td>';
  let origStr = Object.entries(totalOrig).map(([c, v]) => fmt(v, c)).join(' + ');
  h += '<td class="al"><b>' + origStr + '</b></td></tr>';
  h += '</table>';
  showDialog({ title: title, content: h, cancel: false, okText: '确定', okClass: 'dlg-btn-ok', onOk: function(){} });
}

function sortDetail(col) {

/* ========== Calc ========== */
function calcShares(exp) {
  let parts = exp.participants, custom = exp.custom || {};
  let fixedSum = 0, splitNames = [];
  parts.forEach(p => {
    let c = custom[p];
    if (c && c.amount !== undefined && c.amount !== null && c.amount !== '') { fixedSum += Number(c.amount); if (c.alsoSplit) splitNames.push(p); }
    else splitNames.push(p);
  });
  let rem = exp.amount - fixedSum;
  let eqAmt = splitNames.length > 0 ? rem / splitNames.length : 0;
  return parts.map(p => {
    let c = custom[p];
    if (c && c.amount !== undefined && c.amount !== null && c.amount !== '') { let base = Number(c.amount); return { name: p, amount: c.alsoSplit ? base + eqAmt : base }; }
    return { name: p, amount: eqAmt };
  });
}

function calcBalancesRMB(list) {
  let bal = {};
  cur().people.forEach(p => bal[p] = 0);
  list.forEach(e => {
    let rmbAmt = toBase(e.amount, e.currency);
    if (e.multiPayments && Object.keys(e.multiPayments).length > 0) {
      Object.entries(e.multiPayments).forEach(([payer, payAmt]) => {
        bal[payer] = (bal[payer] || 0) + toBase(payAmt, e.currency);
      });
    } else {
      bal[e.payer] = (bal[e.payer] || 0) + rmbAmt;
    }
    calcShares(e).forEach(s => {
      let shareRMB = toBase(s.amount, e.currency);
      bal[s.name] = (bal[s.name] || 0) - shareRMB;
    });
  });
  return bal;
}

function calcBillTransfers(list) {
  let result = [];
  list.forEach(e => {
    let shares = calcShares(e);
    // Calculate each person's payment
    let payments = {};
    if (e.multiPayments && Object.keys(e.multiPayments).length > 0) {
      Object.entries(e.multiPayments).forEach(([name, amt]) => { payments[name] = amt; });
    } else if (e.payer) {
      payments[e.payer] = e.amount;
    }
    // Calculate net balance: payment - share
    let balances = {};
    shares.forEach(s => {
      let paid = payments[s.name] || 0;
      balances[s.name] = paid - s.amount;
    });
    // Generate transfers: negative balance pays positive balance
    let arr = Object.entries(balances).filter(([_, v]) => Math.abs(v) >= 0.01).map(([n, v]) => ({ n, v })).sort((a, b) => b.v - a.v);
    let i = 0, j = arr.length - 1;
    while (i < j) {
      if (arr[i].v <= 0.01) { i++; continue; }
      if (arr[j].v >= -0.01) { j--; continue; }
      let amt = Math.min(arr[i].v, -arr[j].v);
      result.push({ bill: e.name, from: arr[j].n, to: arr[i].n, amount: Math.round(amt * 100) / 100, currency: e.currency });
      arr[i].v -= amt; arr[j].v += amt;
      if (arr[i].v < 0.01) i++;
      if (arr[j].v > -0.01) j--;
    }
  });
  return result;
}

function calcTransfers(bal) {
  let arr = Object.entries(bal).filter(([_, v]) => Math.abs(v) >= 0.01).map(([n, v]) => ({ n, v })).sort((a, b) => b.v - a.v);
  let res = [], i = 0, j = arr.length - 1;
  while (i < j) {
    if (arr[i].v <= 0.01) { i++; continue; }
    if (arr[j].v >= -0.01) { j--; continue; }
    let amt = Math.min(arr[i].v, -arr[j].v);
    res.push({ from: arr[j].n, to: arr[i].n, amount: Math.round(amt * 100) / 100 });
    arr[i].v -= amt; arr[j].v += amt;
    if (arr[i].v < 0.01) i++;
    if (arr[j].v > -0.01) j--;
  }
  return res;
}

function renderCustomInputs() {
  let container = document.getElementById('customList');
  let ev = cur();
  let parts = [...S.fParts].sort((a, b) => ev.people.indexOf(a) - ev.people.indexOf(b));
  let existingInputs = container.querySelectorAll('.ai-in');
  if (existingInputs.length === parts.length && parts.every((p, i) => existingInputs[i] && existingInputs[i].dataset.person === p)) {
    // Optimization: inputs already exist, just update values and hints
    parts.forEach((p, i) => {
      let c = S.fCustoms[p] || {};
      let v = c.amount !== undefined ? c.amount : '';
      existingInputs[i].value = v;
    });
    updateCustomHints(); updateSplitButtons(); return;
  }
  let h = '';
  parts.forEach(p => {
    let c = S.fCustoms[p] || {};
    let v = c.amount !== undefined ? c.amount : '';
    let also = c.alsoSplit !== false;
    h += '<div class="ai"><span class="ai-n">' + p + '</span>';
    h += '<input class="ai-in" type="number" inputmode="decimal" step="0.01" placeholder="" value="' + v + '" data-person="' + p + '" oninput="onCustomInput(\'' + p + '\',this.value)">';
    h += '<span class="ai-sw ' + (also ? 'on' : 'off') + '" data-split="' + p + '" onclick="toggleAlsoSplit(\'' + p + '\')"><span class="ai-sw-dot"></span>' + (also ? '分摊剩余' : '固定金额') + '</span>';
    h += '<span class="ai-h" data-hint="' + p + '"></span></div>';
  });
  container.innerHTML = h;
  updateCustomHints();
}

function updateSplitButtons() {
  [...S.fParts].forEach(p => {
    let btn = document.querySelector('[data-split="' + p + '"]');
    if (!btn) return;
    let cs = S.fCustoms[p];
    let hasAmount = cs && cs.amount !== undefined && cs.amount !== '' && Number(cs.amount) !== 0;
    let also = cs ? cs.alsoSplit !== false : true;
    btn.className = 'ai-sw ' + (also ? 'on' : 'off');
    btn.innerHTML = '<span class="ai-sw-dot"></span>' + (also ? '分摊剩余' : '固定金额');
    btn.style.opacity = (!hasAmount && !also) ? '0.5' : '1';
  });
}

function updateCustomHints() {
  let c = document.getElementById('fCur').value;
  let amt = parseFloat(document.getElementById('fAmt').value) || 0;
  let parts = [...S.fParts];
  let fixedSum = 0, splitCount = 0;
  parts.forEach(p => {
    let cs = S.fCustoms[p];
    if (cs && cs.amount !== undefined && cs.amount !== '') { fixedSum += Number(cs.amount); if (cs.alsoSplit) splitCount++; }
    else splitCount++;
  });
  let rem = amt - fixedSum;
  let eqAmt = splitCount > 0 ? rem / splitCount : 0;
  parts.forEach(p => {
    let hintEl = document.querySelector('[data-hint="' + p + '"]');
    if (!hintEl) return;
    let cs = S.fCustoms[p];
    let isFixed = cs && cs.amount !== undefined && cs.amount !== '';
    if (isFixed && cs.alsoSplit) hintEl.textContent = fmt(Number(cs.amount) + eqAmt, c);
    else if (isFixed) hintEl.textContent = fmt(Number(cs.amount), c);
    else hintEl.textContent = splitCount > 0 && rem >= 0 ? fmt(eqAmt, c) : '';
  });
  let hintEl = document.getElementById('customHint');
  if (amt > 0 && fixedSum > amt) { hintEl.textContent = '⚠ 指定金额合计(' + fmt(fixedSum, c) + ')超过总额(' + fmt(amt, c) + ')'; hintEl.className = 'hint warn'; }
  else if (amt > 0 && splitCount === 0 && Math.abs(fixedSum - amt) > 0.01) { hintEl.textContent = '⚠ 指定金额合计(' + fmt(fixedSum, c) + ') ≠ 总额(' + fmt(amt, c) + ')'; hintEl.className = 'hint warn'; }
  else if (amt > 0 && splitCount > 0 && fixedSum > 0) { hintEl.textContent = '剩余 ' + fmt(Math.max(0, rem), c) + ' 由 ' + splitCount + ' 人均分，每人 ' + fmt(Math.max(0, rem) / splitCount, c); hintEl.className = 'hint'; }
  else if (amt > 0 && splitCount > 0) { hintEl.textContent = '总额 ' + fmt(amt, c) + ' 由 ' + splitCount + ' 人均分，每人 ' + fmt(amt / splitCount, c); hintEl.className = 'hint'; }
  else hintEl.textContent = '';
}

function onCustomInput(p, v) {
  if (v === '') delete S.fCustoms[p];
  else { if (!S.fCustoms[p]) S.fCustoms[p] = { amount: v, alsoSplit: true }; else S.fCustoms[p].amount = v; }
  updateSplitButtons(); updateCustomHints();
}

function syncCustomFromMultiPayer() {
  // When both multi-payer and custom are enabled, custom split amounts auto-fill from payment amounts
  // Users can still modify them after
  S.fPayers.forEach(p => {
    if (S.fParts.has(p)) {
      let paymentAmt = parseFloat(S.fPayments[p]) || 0;
      if (paymentAmt > 0) {
        if (!S.fCustoms[p]) S.fCustoms[p] = {};
        S.fCustoms[p].amount = String(paymentAmt);
        S.fCustoms[p].alsoSplit = true; // Split remaining, not fixed amount
      }
    }
  });

  renderCustomInputs();
  updateSplitButtons();
  updateCustomHints();
}

function toggleAlsoSplit(p) {
  if (!S.fCustoms[p]) S.fCustoms[p] = { amount: '', alsoSplit: true };
  let cs = S.fCustoms[p];
  let hasAmount = cs.amount !== undefined && cs.amount !== '' && Number(cs.amount) !== 0;
  if (cs.alsoSplit && !hasAmount) {
    // Switching to "固定金额" with empty amount: set to 0
    cs.amount = 0;
    cs.alsoSplit = false;
    let input = document.querySelector('.ai-in[data-person="' + p + '"]');
    if (input) input.value = 0;
    updateSplitButtons(); updateCustomHints();
    return;
  }
  cs.alsoSplit = !cs.alsoSplit;
  updateSplitButtons(); updateCustomHints();
}

document.addEventListener('change', function(e) {

function renderMultiPayerInputs() {

function onMultiPayerInput(p, v) {
